spring.application.name=BiNewsian

server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# Supabase S3 Configuration
supabase.s3.endpoint=${S3_ENDPOINT}
supabase.s3.public-base-url=${S3_PUBLIC_BASE_URL}
supabase.s3.region=${S3_REGION}
supabase.s3.access-key=${S3_ACCESS_KEY}
supabase.s3.secret-key=${S3_SECRET_KEY}
supabase.s3.bucket-name=${S3_BUCKET_NAME}

# Email Configuration
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# Resend API Configuration
resend.api.key=${RESEND_API_KEY}
resend.from.email=${RESEND_FROM_EMAIL}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# Error Pages Configuration
server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
