<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/panel}">
<head>
    <title>Admin Panel</title>

    <th:block layout:fragment="styles">
        <style>
            body {
                min-height:100vh;
                padding-top: 73px;
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mb-4">
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/admin/panel}" class="btn btn-gradient" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <button class="btn btn-light" style="border:1px solid #c3c4c7;" data-bs-toggle="modal" data-bs-target="#createContributorModal">
                    <i class="bi bi-plus-lg"></i> New Contributor
                </button>
                <button type="button" class="btn btn-light" style="border:1px solid #c3c4c7;" data-bs-toggle="modal" data-bs-target="#createCategoryModal">
                    <i class="bi bi-plus-lg"></i> Create Category
                </button>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="container mb-4">
            <div class="row g-3">
                <div th:replace="fragments/stat-card :: statCard('bi-newspaper', 'Total News', ${summary.totalNews}, 'icon-news')"></div>
                <div th:replace="fragments/stat-card :: statCard('bi-activity', 'Total Activity', ${summary.totalActivity}, 'icon-activity')"></div>
                <div th:replace="fragments/stat-card :: statCard('bi-tags', 'Total Category', ${summary.totalCategory}, 'icon-published')"></div>
                <div th:replace="fragments/stat-card :: statCard('bi-file-earmark', 'Total Contributor', ${summary.totalContributor}, 'icon-draft')"></div>
            </div>
        </div>

        <!-- Content Card -->
        <div class="container mb-4">
            <div class="card content-card">
                <div class="card-body">
                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-3" id="newsTabs">
                        <div class="d-flex mb-3">
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-news" type="button" role="tab">
                                    <i class="bi bi-newspaper me-1"></i> Manage News
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-activity" type="button" role="tab">
                                    <i class="bi bi-activity me-1"></i> Manage Activity
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-category" type="button" role="tab">
                                    <i class="bi bi-tags me-1"></i> Manage Category
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-contributor" type="button" role="tab">
                                    <i class="bi bi-file-earmark me-1"></i> Manage Contributor
                                </button>
                            </li>
                        </div>
                    </ul>

                    <!-- Tab Panels -->
                    <div class="tab-content">
                        <!-- Manage News -->
                        <div class="tab-pane fade" id="panel-news" role="tabpanel" aria-labelledby="tab-news">
                            <!-- Search -->
                            <div th:if="${!#lists.isEmpty(news)}" class="search-wrap mb-3 d-flex align-items-center gap-2">
                                <i class="bi bi-search text-muted"></i>
                                <input id="searchNews" data-list="#newsList" data-empty="#noNews" type="text" class="form-control" placeholder="Search News">
                            </div>

                            <!-- News List -->
                            <div id="newsList" th:if="${!#lists.isEmpty(news)}">
                                <div class="news-item" th:each="news : ${news}" th:attr="data-name=${news.title}">
                                    <div class="d-flex align-items-start">
                                        <div class="thumb me-3 d-flex align-items-center justify-content-center bg-light rounded">
                                            <!-- Image -->
                                            <img th:if="${news.featuredImageUrl != null}" th:src="${news.featuredImageUrl}"
                                                 class="w-100 h-100 object-fit-cover rounded" alt="Thumbnail">

                                            <!-- Placeholder -->
                                            <i th:if="${news.featuredImageUrl == null}" class="bi bi-image text-muted fs-4"></i>
                                        </div>

                                        <div class="flex-grow-1">
                                            <div class="d-flex align-items-start justify-content-between">
                                                <h6 class="news-title mb-1" th:text="${news.title}"></h6>

                                                <div class="d-flex align-items-center gap-2">
                                                    <span class="status-pill status-published" th:text="${news.status.getDisplayName()}">-</span>

                                                    <div class="dropdown">
                                                        <button class="btn btn-link p-1 ellipsis-btn" type="button" data-bs-toggle="dropdown">
                                                            <i class="bi bi-three-dots-vertical"></i>
                                                        </button>

                                                        <ul class="dropdown-menu dropdown-menu-end">
                                                            <li>
                                                                <button class="dropdown-item text-danger action-delete" th:data-id="${news.id}" th:data-type="news">
                                                                    <i class="bi bi-trash me-2"></i> Delete
                                                                </button>
                                                            </li>
                                                        </ul>
                                                    </div>
                                                </div>
                                            </div>

                                            <div class="d-flex flex-wrap gap-2 mb-1">
                                                <span class="badge badge-soft">
                                                    <i class="bi bi-tag"></i>
                                                    <span th:text="${news.category.name}">-</span>
                                                </span>
                                                <span class="text-muted small">
                                                    • <span th:text="${#temporals.format(news.createdAt, 'dd MMMM yyyy')}">-</span>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(news)}" class="text-muted text-center">
                                No news yet.
                            </div>

                            <div id="noNews" style="display:none;" class="text-muted text-center">
                                No matching news.
                            </div>

                            <!-- Pagination -->
                            <nav th:if="${newsTotalPages > 1}" class="mt-3">
                                <ul class="pagination justify-content-center">
                                    <li class="page-item" th:classappend="${newsCurrentPage == 0} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/panel(newsPage=${newsCurrentPage - 1}, tab='news')}">
                                            &laquo;
                                        </a>
                                    </li>

                                    <li class="page-item" th:each="i : ${#numbers.sequence(0, newsTotalPages - 1)}" th:classappend="${i == newsCurrentPage} ? 'active'">
                                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/panel(newsPage=${i}, tab='news')}"></a>
                                    </li>

                                    <li class="page-item" th:classappend="${newsCurrentPage + 1 == newsTotalPages} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/panel(newsPage=${newsCurrentPage + 1}, tab='news')}">
                                            &raquo;
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>

                        <!-- Manage Activity  -->
                        <div class="tab-pane fade" id="panel-activity" role="tabpanel" aria-labelledby="tab-activity">
                            <!-- Search -->
                            <div th:if="${!#lists.isEmpty(activities)}" class="search-wrap mb-3 d-flex align-items-center gap-2">
                                <i class="bi bi-search text-muted"></i>
                                <input id="searchActivity" data-list="#activityList" data-empty="#noActivities" type="text" class="form-control" placeholder="Search Activity" aria-label="Search Activity">
                            </div>

                            <!-- Activity List -->
                            <div id="activityList" th:if="${!#lists.isEmpty(activities)}">
                                <div class="news-item" th:each="activity : ${activities}" th:attr="data-name=${activity.title}">
                                    <div class="d-flex align-items-start">
                                        <div class="flex-grow-1">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <h6 class="mb-1" th:text="${activity.title}"></h6>

                                                <div class="dropdown">
                                                    <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">
                                                        <i class="bi bi-three-dots-vertical"></i>
                                                    </button>
                                                    <ul class="dropdown-menu dropdown-menu-end">
                                                        <li>
                                                            <button class="dropdown-item text-danger action-delete" th:data-id="${activity.id}" th:data-type="activity">
                                                                <i class="bi bi-trash me-2"></i> Delete
                                                            </button>
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>

                                            <span class="badge badge-soft">
                                                <span th:text="${activity.type.getDisplayName()}">-</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(activities)}" class="text-muted text-center">
                                No activities yet.
                            </div>

                            <div id="noActivities" style="display:none;" class="text-muted text-center">
                                No matching activities.
                            </div>

                            <!-- Pagination -->
                            <nav th:if="${activitiesTotalPages > 1}" class="mt-3">
                                <ul class="pagination justify-content-center">
                                    <li class="page-item" th:classappend="${activitiesCurrentPage == 0} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/panel(activityPage=${activitiesCurrentPage - 1}, tab='activity')}">
                                            &laquo;
                                        </a>
                                    </li>

                                    <li class="page-item" th:each="i : ${#numbers.sequence(0, activitiesTotalPages - 1)}" th:classappend="${i == activitiesCurrentPage} ? 'active'">
                                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/panel(activityPage=${i}, tab='activity')}"></a>
                                    </li>

                                    <li class="page-item" th:classappend="${activitiesCurrentPage + 1 == activitiesTotalPages} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/panel(activityPage=${activitiesCurrentPage + 1}, tab='activity')}">
                                            &raquo;
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>

                        <!-- Manage Category -->
                        <div class="tab-pane fade" id="panel-category" role="tabpanel" aria-labelledby="tab-category">
                            <!-- Search -->
                            <div th:if="${!#lists.isEmpty(categories)}" class="search-wrap mb-3 d-flex align-items-center gap-2">
                                <i class="bi bi-search text-muted"></i>
                                <input id="searchCategory" data-list="#categoryList" data-empty="#noCategories" type="text" class="form-control" placeholder="Search Category">
                            </div>

                            <!-- Category List -->
                            <div id="categoryList" th:if="${!#lists.isEmpty(categories)}">
                                <div class="news-item" th:each="category : ${categories}" th:attr="data-name=${category.name}">
                                    <div class="d-flex align-items-start">
                                        <div class="flex-grow-1">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <h6 class="mb-1" th:text="${category.name}"></h6>

                                                <div class="dropdown">
                                                    <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">
                                                        <i class="bi bi-three-dots-vertical"></i>
                                                    </button>
                                                    <ul class="dropdown-menu dropdown-menu-end">
                                                        <li>
                                                            <button class="dropdown-item action-edit" th:attr="data-id=${category.id}">
                                                                <i class="bi bi-pencil me-2"></i> Edit
                                                            </button>
                                                        </li>
                                                        <li>
                                                            <button class="dropdown-item text-danger action-delete" th:data-id="${category.id}" th:data-type="category">
                                                                <i class="bi bi-trash me-2"></i> Delete
                                                            </button>
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>

                                            <span class="badge badge-soft">
                                                <i class="bi bi-tag"></i> Category
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(categories)}" class="text-muted text-center">
                                No categories yet.
                            </div>

                            <div id="noCategories" style="display:none;" class="text-muted text-center">
                                No matching categories.
                            </div>

                            <!-- Pagination -->
                            <nav th:if="${categoryTotalPages > 1}" class="mt-3">
                                <ul class="pagination justify-content-center">
                                    <li class="page-item" th:classappend="${categoryCurrentPage == 0} ? 'disabled'">
                                        <a class="page-link"th:href="@{/admin/panel(categoryPage=${categoryCurrentPage - 1}, tab='category')}">
                                            &laquo;
                                        </a>
                                    </li>

                                    <li class="page-item" th:each="i : ${#numbers.sequence(0, categoryTotalPages - 1)}" th:classappend="${i == categoryCurrentPage} ? 'active'">
                                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/panel(categoryPage=${i}, tab='category')}"></a>
                                    </li>

                                    <li class="page-item" th:classappend="${categoryCurrentPage + 1 == categoryTotalPages} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/panel(categoryPage=${categoryCurrentPage + 1}, tab='category')}">
                                            &raquo;
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>

                        <!-- Manage Contributor  -->
                        <div class="tab-pane fade" id="panel-contributor" role="tabpanel" aria-labelledby="tab-contributor">
                            <!-- Search -->
                            <div th:if="${!#lists.isEmpty(contributors)}" class="search-wrap mb-3 d-flex align-items-center gap-2">
                                <i class="bi bi-search text-muted"></i>
                                <input id="searchContributor" data-list="#contributorList" data-empty="#noContributors" type="text" class="form-control" placeholder="Search Contributor">
                            </div>

                            <!-- Contributor List -->
                            <div id="contributorList" th:if="${!#lists.isEmpty(contributors)}">
                                <div class="news-item" th:each="contributor : ${contributors}" th:attr="data-name=${contributor.username}">
                                    <div class="d-flex align-items-start">
                                        <div class="flex-grow-1">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <div>
                                                    <h6 class="fw-semibold mb-1" th:text="${contributor.username}"></h6>

                                                    <small class="text-muted d-flex align-items-center gap-1">
                                                        <i class="bi bi-envelope"></i>
                                                        <span th:text="${contributor.email}">-</span>
                                                    </small>
                                                </div>

<!--                                                <div class="dropdown">-->
<!--                                                    <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">-->
<!--                                                        <i class="bi bi-three-dots-vertical"></i>-->
<!--                                                    </button>-->
<!--                                                    <ul class="dropdown-menu dropdown-menu-end">-->
<!--                                                        <li>-->
<!--                                                            <button class="dropdown-item text-danger action-delete" th:data-id="${contributor.id}" th:data-type="contributor">-->
<!--                                                                <i class="bi bi-trash me-2"></i> Delete-->
<!--                                                            </button>-->
<!--                                                        </li>-->
<!--                                                    </ul>-->
<!--                                                </div>-->
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(contributors)}" class="text-muted text-center">
                                No contributors yet.
                            </div>

                            <div id="noContributors" style="display:none;" class="text-muted text-center">
                                No matching contributors.
                            </div>

                            <!-- Pagination -->
                            <nav th:if="${contributorTotalPages > 1}" class="mt-3">
                                <ul class="pagination justify-content-center">
                                    <li class="page-item" th:classappend="${contributorCurrentPage == 0} ? 'disabled'">
                                        <a class="page-link"th:href="@{/admin/panel(contributorPage=${contributorCurrentPage - 1}, tab='contributor')}">
                                            &laquo;
                                        </a>
                                    </li>

                                    <li class="page-item" th:each="i : ${#numbers.sequence(0, contributorTotalPages - 1)}" th:classappend="${i == contributorCurrentPage} ? 'active'">
                                        <a class="page-link" th:text="${i + 1}" th:href="@{/admin/panel(contributorPage=${i}, tab='contributor')}"></a>
                                    </li>

                                    <li class="page-item" th:classappend="${contributorCurrentPage + 1 == contributorTotalPages} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/panel(contributorPage=${contributorCurrentPage + 1}, tab='contributor')}">
                                            &raquo;
                                        </a>
                                    </li>
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Category Modal -->
        <div class="modal fade" id="createCategoryModal" tabindex="-1" aria-labelledby="createCategoryModal" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="createCategoryModalLabel">Create Category</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="categoryName" class="form-label">Category Name</label>
                            <input type="text" class="form-control" id="categoryName" required>
                            <div id="categoryError" class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" id="btnCreateCategory" class="btn btn-purple">Create Category</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Category Modal -->
        <div class="modal fade" id="editCategoryModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5">Edit Category</h1>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <input type="hidden" id="editCategoryId">
                        <div class="mb-3">
                            <label class="form-label">Category Name</label>
                            <input type="text" id="editCategoryName" class="form-control">
                            <div id="editCategoryError" class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button class="btn btn-purple" id="btnUpdateCategory">Update</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Contributor Modal -->
        <div class="modal fade" id="createContributorModal" tabindex="-1" aria-labelledby="createContributorModal" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="createContributorLabel">Create Contributor</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="contributorName" class="form-label">Username</label>
                            <input type="text" class="form-control" id="contributorName" required>
                            <div id="usernameError" class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label for="contributorEmail" class="form-label">Email</label>
                            <input type="text" class="form-control" id="contributorEmail" required>
                            <div id="emailError" class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button id="btnCreateContributor" class="btn btn-purple">
                            <span class="btn-text">Create Contributor</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script th:inline="javascript">
            const searchConfig = {
                'searchNews': { endpoint: '/admin/news/search', type: 'news' },
                'searchCategory': { endpoint: '/admin/categories/search', type: 'category' },
                'searchActivity': { endpoint: '/admin/activities/search', type: 'activity' },
                'searchContributor': { endpoint: '/admin/contributors/search', type: 'contributor' }
            };

            $("[id^='search']").on("input", function () {
                const q = $(this).val().toLowerCase();
                const searchId = $(this).attr('id');
                const list = $(this).data("list");
                const empty = $(this).data("empty");
                const tabPane = $(this).closest('.tab-pane');
                const pagination = tabPane.find('nav');

                if (q.length === 0) {
                    location.reload();
                    return;
                }

                const config = searchConfig[searchId];
                if (!config) {
                    return;
                }

                pagination.hide();

                $.ajax({
                    url: config.endpoint,
                    method: 'GET',
                    data: { query: q },
                    success: function(data) {

                        $(list).empty();

                        if (data.length === 0) {
                            $(empty).show();
                        } else {
                            $(empty).hide();

                            data.forEach(function(item) {
                                const html = renderItemFromObject(item, config.type);
                                $(list).append(html);
                            });
                        }
                    },
                    error: function(xhr, status, error) {
                        $(empty).text('Search failed. Please try again.').show();
                    }
                })
            })

            function renderItemFromObject(item, type) {
                switch(type) {
                    case 'news':
                        return renderNewsItem(item);
                    case 'category':
                        return renderCategoryItem(item);
                    case 'activity':
                        return renderActivityItem(item);
                    case 'contributor':
                        return renderContributorItem(item);
                    default:
                        return '';
                }
            }

            function renderNewsItem(item) {
                return `
                    <div class="news-item" data-name="${item.title || ''}">
                        <div class="d-flex align-items-start">
                            <div class="thumb me-3 d-flex align-items-center justify-content-center bg-light rounded">
                                ${item.featuredImageUrl
                                    ? `<img src="${item.featuredImageUrl}" class="w-100 h-100 object-fit-cover rounded" alt="Thumbnail">`
                                    : `<i class="bi bi-image text-muted fs-4"></i>`
                                }
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-start justify-content-between">
                                    <h6 class="news-title mb-1">${item.title || ''}</h6>
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="status-pill status-published">${item.status || '-'}</span>
                                        <div class="dropdown">
                                            <button class="btn btn-link p-1 ellipsis-btn" type="button" data-bs-toggle="dropdown">
                                                <i class="bi bi-three-dots-vertical"></i>
                                            </button>
                                            <ul class="dropdown-menu dropdown-menu-end">
                                                <li>
                                                    <button class="dropdown-item text-danger action-delete" data-id="${item.id}" data-type="news">
                                                        <i class="bi bi-trash me-2"></i> Delete
                                                    </button>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex flex-wrap gap-2 mb-1">
                                    <span class="badge badge-soft">
                                        <i class="bi bi-tag"></i>
                                        <span>${item.category || '-'}</span>
                                    </span>
                                    <span class="text-muted small">• <span>${item.createdAt || ''}</span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            function renderCategoryItem(item) {
                return `
                    <div class="news-item" data-name="${item.name}">
                        <div class="d-flex align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <h6 class="mb-1">${item.name}</h6>
                                    <div class="dropdown">
                                        <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button class="dropdown-item action-edit" data-id="${item.id}">
                                                    <i class="bi bi-pencil me-2"></i> Edit
                                                </button>
                                            </li>
                                            <li>
                                                <button class="dropdown-item text-danger action-delete" data-id="${item.id}" data-type="category">
                                                    <i class="bi bi-trash me-2"></i> Delete
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <span class="badge badge-soft">
                                    <i class="bi bi-tag"></i> Category
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }

            function renderActivityItem(item) {
                return `
                    <div class="news-item" data-name="${item.title || ''}">
                        <div class="d-flex align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <h6 class="mb-1">${item.title || ''}</h6>
                                    <div class="dropdown">
                                        <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">
                                            <i class="bi bi-three-dots-vertical"></i>
                                        </button>
                                        <ul class="dropdown-menu dropdown-menu-end">
                                            <li>
                                                <button class="dropdown-item text-danger action-delete" data-id="${item.id}" data-type="activity">
                                                    <i class="bi bi-trash me-2"></i> Delete
                                                </button>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                <span class="badge badge-soft">
                                    <span>${item.type || '-'}</span>
                                </span>
                            </div>
                        </div>
                    </div>
                `;
            }

            function renderContributorItem(item) {
                return `
                    <div class="news-item" data-name="${item.username || ''}">
                        <div class="d-flex align-items-start">
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-start">
                                    <div>
                                        <h6 class="fw-semibold mb-1">${item.username || ''}</h6>
                                        <small class="text-muted d-flex align-items-center gap-1">
                                            <i class="bi bi-envelope"></i>
                                            <span>${item.email || '-'}</span>
                                        </small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            $("#categoryName").on("input", function () {
                validateAlphaOnly($(this), $("#categoryError"));
            })

            $("#editCategoryName").on("input", function () {
                validateAlphaOnly($(this), $("#editCategoryError"));
            })

            $("#contributorName, #contributorEmail").on("input", function () {
                $(this).removeClass("is-invalid");

                if (this.id === "contributorName") {
                    $("#usernameError").text("");
                }

                if (this.id === "contributorEmail") {
                    $("#emailError").text("");
                }
            });

            $(document).on("click", ".action-edit", function () {
                const id = $(this).data("id");
                const name = $(this).closest(".news-item").data("name");

                $("#editCategoryId").val(id);
                $("#editCategoryName").val(name);
                $("#editCategoryName").removeClass("is-invalid");
                $("#editCategoryError").text("");

                $("#editCategoryModal").modal("show");
            })

            $("#createCategoryModal").on("hidden.bs.modal", function () {
                resetCategoryForm();
            })

            $("#createContributorModal").on("hidden.bs.modal", function () {
                resetContributorForm();
            })

            $("#btnCreateCategory").click(function () {
                const name = $("#categoryName").val().trim();

                if (name === "") {
                    $("#categoryName").addClass("is-invalid");
                    $("#categoryError").text("Category name is required.");
                    return;
                }

                $.ajax({
                    url: "/admin/categories/create",
                    method: "POST",
                    data: { name: name },
                    success: function () {
                        $("#createCategoryModal").modal("hide");

                        $("#createCategoryModal").one("hidden.bs.modal", function () {
                            Swal.fire({
                                icon: "success",
                                title: "Created!",
                                text: "Category created successfully!",
                                timer: 1600,
                                showConfirmButton: false
                            }).then(() => {
                                resetCategoryForm();
                                location.reload();
                            });
                        });

                        location.reload();
                    },
                    error: function (xhr) {
                        if (xhr.status === 400) {
                            $("#categoryName").addClass("is-invalid");
                            $("#categoryError").text(xhr.responseText || "Invalid category name.");
                        } else {
                            Swal.fire({
                                icon: "error",
                                title: "Failed to update category",
                                text: xhr.responseText || "Unknown error"
                            })
                        }
                    }
                })
            })

            $("#btnCreateContributor").click(function () {
                const $btn = $("#btnCreateContributor");
                const $btnText = $btn.find(".btn-text");
                const $spinner = $btn.find(".spinner-border");

                const username = $("#contributorName").val().trim();
                const email = $("#contributorEmail").val().trim();

                resetContributorForm();

                let hasError = false;

                if (username === "") {
                    $("#contributorName").addClass("is-invalid");
                    $("#usernameError").text("Username is required.");
                    hasError = true;
                }

                if (email === "") {
                    $("#contributorEmail").addClass("is-invalid");
                    $("#emailError").text("Email is required.");
                    hasError = true;
                } else if (!isValidEmail(email)) {
                    $("#contributorEmail").addClass("is-invalid");
                    $("#emailError").text("Invalid email format.");
                    hasError = true;
                }

                if (hasError) return;

                $btn.prop("disabled", true);
                $btnText.text("Creating...");
                $spinner.removeClass("d-none");

                $.ajax({
                    url: "/admin/contributors/create",
                    method: "POST",
                    data: {
                        username: username,
                        email: email
                    },
                    success: function () {
                        $("#createContributorModal").modal("hide");

                        $("#createContributorModal").one("hidden.bs.modal", function () {
                            Swal.fire({
                                icon: "success",
                                title: "Created!",
                                text: "Contributor created successfully!",
                                timer: 1600,
                                showConfirmButton: false
                            }).then(() => {
                                resetContributorForm();
                                location.reload();
                            });
                        });
                    },
                    error: function (xhr) {
                        if (xhr.status === 400) {
                            const message = xhr.responseText;

                            $("#contributorName, #contributorEmail").removeClass("is-invalid");
                            $("#usernameError, #emailError").text("");

                            if (message.toLowerCase().includes("username")) {
                                $("#contributorName").addClass("is-invalid");
                                $("#usernameError").text(message);
                            } else if (message.toLowerCase().includes("email")) {
                                $("#contributorEmail").addClass("is-invalid");
                                $("#emailError").text(message);
                            }
                        } else {
                            Swal.fire({
                                icon: "error",
                                title: "Failed to create contributor",
                                text: xhr.responseText || "Unknown error"
                            });
                        }
                    },
                    complete: function () {
                        $btn.prop("disabled", false);
                        $btnText.text("Create Contributor");
                        $spinner.addClass("d-none");
                    }
                })
            })

            $("#btnUpdateCategory").click(function () {
                const id = $("#editCategoryId").val();
                const name = $("#editCategoryName").val().trim();

                if (name === "") {
                    $("#editCategoryName").addClass("is-invalid");
                    $("#editCategoryError").text("Category name is required.");
                    return;
                }

                $.ajax({
                    url: "/admin/categories/update",
                    method: "POST",
                    data: { id: id, name: name },
                    success: function () {
                        $("#editCategoryModal").modal("hide");

                        $("#editCategoryModal").one("hidden.bs.modal", function () {
                            Swal.fire({
                                icon: "success",
                                title: "Updated!",
                                text: "Category updated successfully!",
                                timer: 1600,
                                showConfirmButton: false
                            }).then(() => {
                                resetCategoryForm();
                                location.reload();
                            });
                        });
                    },

                    error: function (xhr) {
                        if (xhr.status === 400) {
                            $("#editCategoryName").addClass("is-invalid");
                            $("#editCategoryError").text(xhr.responseText || "Invalid category name.");
                        } else {
                            Swal.fire({
                                icon: "error",
                                title: "Failed to update category",
                                text: xhr.responseText || "Unknown error"
                            })
                        }
                    }
                })
            })

            $(document).on("click", ".action-delete", function () {
                let ajaxUrl = null;

                const id = $(this).data("id");
                const type = $(this).data("type");

                if (type === "category") ajaxUrl = "/admin/categories/delete";
                if (type === "news") ajaxUrl = "/admin/news/delete";
                if (type === "activity") ajaxUrl = "/admin/activities/delete";

                Swal.fire({
                    title: "Delete category?",
                    text: "This action cannot be undone.",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonText: "Delete",
                    cancelButtonText: "Cancel"
                }).then(result => {
                    if (!result.isConfirmed) return;

                    $.ajax({
                        url: ajaxUrl,
                        method: "POST",
                        data: { id: id },

                        success: function () {
                            Swal.fire({
                                icon: "success",
                                title: "Deleted!",
                                text: "Item has been deleted.",
                                timer: 1600,
                                showConfirmButton: false
                            }).then(() => location.reload());
                        },
                        error: function (xhr) {
                            let message = "Unexpected server error.";

                            if (xhr.status === 400 && xhr.responseText) {
                                message = xhr.responseText;
                            } else if (xhr.status === 500) {
                                message = xhr.responseText || "Unexpected server error.";
                            }

                            Swal.fire({
                                icon: "error",
                                title: "Delete failed",
                                text: message
                            })
                        }
                    })
                })
            })

            function isValidEmail(email) {
                const emailRegex = /^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$/;
                return emailRegex.test(email);
            }

            function validateAlphaOnly(inputElement, errorElement) {
                const regex = /^[A-Za-z\s]*$/;
                const value = inputElement.val();

                if (!regex.test(value)) {
                    inputElement.addClass("is-invalid");
                    errorElement.text("Only alphabet letters are allowed.");
                    inputElement.val(value.replace(/[^A-Za-z\s]/g, ""));
                } else {
                    inputElement.removeClass("is-invalid");
                    errorElement.text("");
                }
            }

            function resetCategoryForm() {
                $("#categoryName").val("").removeClass("is-invalid");
                $("#categoryError").text("");
                $("#editCategoryName").val("").removeClass("is-invalid");
                $("#editCategoryError").text("");
            }

            function resetContributorForm() {
                $("#contributorName").val("").removeClass("is-invalid");
                $("#contributorEmail").val("").removeClass("is-invalid");
                $("#usernameError").text("");
                $("#emailError").text("");
            }

            $(document).ready(function () {
                const DEFAULT_TAB = "#panel-news";
                let activeTab = localStorage.getItem("activeAdminTab");

                if (!activeTab) {
                    activeTab = DEFAULT_TAB;
                    localStorage.setItem("activeAdminTab", activeTab);
                }

                const $tabBtn = $(`[data-bs-target="${activeTab}"]`);
                if ($tabBtn.length) {
                    $tabBtn.tab("show");
                }

                $('[data-bs-toggle="tab"]').on("shown.bs.tab", function (e) {
                    const target = $(e.target).data("bs-target");
                    localStorage.setItem("activeAdminTab", target);
                })
            })
        </script>
    </th:block>
</body>
</html>
