<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/panel}">
<head>
    <title>Content Management</title>

    <th:block layout:fragment="styles">
        <style>
            body {
                min-height:100vh;
                padding-top: 73px;
            }
        </style>
    </th:block>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mb-4">
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/contributor/content}" class="btn btn-gradient" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a th:href="@{/contributor/create-news}" class="btn btn-light" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-plus-lg"></i> Create News
                </a>
                <a th:href="@{/contributor/create-activity}" class="btn btn-light" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-plus-lg"></i> Create Activity
                </a>
            </div>
        </div>

        <!-- Stat Cards -->
        <div class="container mb-4">
            <div class="row g-3">
                <div th:replace="fragments/stat-card :: statCard('bi-newspaper', 'Total News', ${summary.totalNews}, 'icon-news')"></div>
                <div th:replace="fragments/stat-card :: statCard('bi-activity', 'Total Activity', ${summary.totalActivity}, 'icon-activity')"></div>
                <div th:replace="fragments/stat-card :: statCard('bi-check2-circle', 'Published', ${summary.totalPublished}, 'icon-published')"></div>
                <div th:replace="fragments/stat-card :: statCard('bi-file-earmark', 'Draft', ${summary.totalDraft}, 'icon-draft')"></div>
            </div>
        </div>

        <!-- Content Card -->
        <div class="container mb-4">
            <div class="card content-card">
                <div class="card-body">
                    <!-- Tabs -->
                    <ul class="nav nav-tabs mb-3" id="newsTabs">
                        <div class="d-flex mb-3">
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-news" type="button" role="tab">
                                    <i class="bi bi-newspaper me-1"></i> My News
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#panel-activity" type="button" role="tab">
                                    <i class="bi bi-activity me-1"></i> My Activity
                                </button>
                            </li>
                        </div>
                    </ul>

                    <!-- Tab Panels -->
                    <div class="tab-content">
                        <!-- My News -->
                        <div class="tab-pane fade" id="panel-news" role="tabpanel" aria-labelledby="tab-news">
                            <div th:if="${!#lists.isEmpty(news)}" class="search-wrap mb-3 d-flex align-items-center gap-2">
                                <i class="bi bi-search text-muted"></i>
                                <input id="searchNews" data-list="#newsList" data-empty="#noNews" type="text" class="form-control" placeholder="Search News">
                            </div>

                            <!-- News List -->
                            <div id="newsList" th:if="${!#lists.isEmpty(news)}">
                                <div class="news-item" th:each="news : ${news}" th:attr="data-name=${news.title}, data-url=@{/news/{id}(id=${news.id})}">
                                    <div th:replace="fragments/panel-news-item :: newsItem"></div>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(news)}" class="text-muted text-center">
                                No news yet.
                            </div>

                            <div id="noNews" style="display:none;" class="text-muted text-center">
                                No matching news.
                            </div>

                            <!-- Pagination -->
                            <div th:if="${!#lists.isEmpty(news)}" class="pagination-info d-flex justify-content-between align-items-center mt-3">
                                <div class="text-muted">
                                    <span th:with="startItem=${newsCurrentPage * newsPageSize + 1},
                                                   endItem=${(newsCurrentPage + 1) * newsPageSize > newsTotalElements ? newsTotalElements : (newsCurrentPage + 1) * newsPageSize}">
                                        Showing
                                        <span th:text="${startItem}">-</span>
                                        to
                                        <span th:text="${endItem}">-</span>
                                        of
                                        <span th:text="${newsTotalElements}">-</span>
                                        news
                                    </span>
                                </div>

                                <nav>
                                    <ul class="pagination mb-0">
                                        <li class="page-item" th:classappend="${newsCurrentPage == 0} ? 'disabled'">
                                            <a class="page-link" th:href="@{/contributor/content(newsPage=${newsCurrentPage - 1}, tab='news')}">
                                                &laquo;
                                            </a>
                                        </li>

                                        <li class="page-item" th:each="i : ${#numbers.sequence(0, newsTotalPages - 1)}" th:classappend="${i == newsCurrentPage} ? 'active'">
                                            <a class="page-link" th:text="${i + 1}" th:href="@{/contributor/content(newsPage=${i}, tab='news')}"></a>
                                        </li>

                                        <li class="page-item" th:classappend="${newsCurrentPage + 1 == newsTotalPages} ? 'disabled'">
                                            <a class="page-link" th:href="@{/contributor/content(newsPage=${newsCurrentPage + 1}, tab='news')}">
                                                &raquo;
                                            </a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>

                        <!-- Manage Activity  -->
                        <div class="tab-pane fade" id="panel-activity" role="tabpanel" aria-labelledby="tab-activity">
                            <!-- Search -->
                            <div th:if="${!#lists.isEmpty(activities)}" class="search-wrap mb-3 d-flex align-items-center gap-2">
                                <i class="bi bi-search text-muted"></i>
                                <input id="searchActivity" data-list="#activityList" data-empty="#noActivities" type="text" class="form-control" placeholder="Search Activity" aria-label="Search Activity">
                            </div>

                            <!-- Activity List -->
                            <div id="activityList" th:if="${!#lists.isEmpty(activities)}">
                                <div class="news-item" th:each="activity : ${activities}" th:attr="data-name=${activity.title}">
                                    <div th:replace="fragments/panel-activity-item :: activityItem"></div>
                                </div>
                            </div>

                            <div th:if="${#lists.isEmpty(activities)}" class="text-muted text-center">
                                No activities yet.
                            </div>

                            <div id="noActivities" style="display:none;" class="text-muted text-center">
                                No matching activities.
                            </div>

                            <!-- Pagination -->
                            <div th:if="${!#lists.isEmpty(activities)}" class="pagination-info d-flex justify-content-between align-items-center mt-3">
                                <div class="text-muted">
                                    <span th:with="startItem=${activitiesCurrentPage * activitiesPageSize + 1},
                                                   endItem=${(activitiesCurrentPage + 1) * activitiesPageSize > activitiesTotalElements ? activitiesTotalElements : (activitiesCurrentPage + 1) * activitiesPageSize}">
                                        Showing
                                        <span th:text="${startItem}">-</span>
                                        to
                                        <span th:text="${endItem}">-</span>
                                        of
                                        <span th:text="${activitiesTotalElements}">-</span>
                                        activities
                                    </span>
                                </div>

                                <nav>
                                    <ul class="pagination mb-0">
                                        <li class="page-item" th:classappend="${activitiesCurrentPage == 0} ? 'disabled'">
                                            <a class="page-link" th:href="@{/contributor/content(activityPage=${activitiesCurrentPage - 1}, tab='activity')}">
                                                &laquo;
                                            </a>
                                        </li>

                                        <li class="page-item" th:each="i : ${#numbers.sequence(0, activitiesTotalPages - 1)}" th:classappend="${i == activitiesCurrentPage} ? 'active'">
                                            <a class="page-link" th:text="${i + 1}" th:href="@{/contributor/content(activityPage=${i}, tab='activity')}"></a>
                                        </li>

                                        <li class="page-item" th:classappend="${activitiesCurrentPage + 1 == activitiesTotalPages} ? 'disabled'">
                                            <a class="page-link" th:href="@{/contributor/content(activityPage=${activitiesCurrentPage + 1}, tab='activity')}">
                                                &raquo;
                                            </a>
                                        </li>
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            $(document).on('click', '.news-item', function (e) {
                if ($(e.target).closest('a, button, .dropdown, .ellipsis-btn').length) {
                    return;
                }

                const url = $(this).data('url');
                if (url) {
                    window.location.href = url;
                }
            });

            const searchConfig = {
                'searchNews': { endpoint: '/contributor/news/search', type: 'news' },
                'searchActivity': { endpoint: '/contributor/activities/search', type: 'activity' }
            };

            $("[id^='search']").on("input", function () {
                const q = $(this).val().toLowerCase();
                const searchId = $(this).attr('id');
                const list = $(this).data("list");
                const empty = $(this).data("empty");
                const tabPane = $(this).closest('.tab-pane');
                const pagination = tabPane.find('.pagination-info');

                if (q.length === 0) {
                    location.reload();
                    return;
                }

                const config = searchConfig[searchId];
                if (!config) {
                    return;
                }

                pagination.addClass('hidden-pagination');

                $.ajax({
                    url: config.endpoint,
                    method: 'GET',
                    data: { query: q },
                    success: function(data) {

                        $(list).empty();

                        if (data.length === 0) {
                            $(empty).show();
                        } else {
                            $(empty).hide();

                            data.forEach(function(item) {
                                const html = renderItemFromObject(item, config.type);
                                $(list).append(html);
                            });
                        }
                    },
                    error: function(xhr, status, error) {
                        $(empty).text('Search failed. Please try again.').show();
                    }
                })
            })

            function renderItemFromObject(item, type) {
                switch(type) {
                    case 'news':
                        return renderNewsItem(item);
                    case 'activity':
                        return renderActivityItem(item);
                    default:
                        return '';
                }
            }

            function renderNewsItem(item) {
                const thumbnail = item.featuredImageUrl
                    ? `<img src="${item.featuredImageUrl}" class="w-100 h-100 object-fit-cover rounded" alt="Thumbnail">`
                    : `<i class="bi bi-image text-muted fs-4"></i>`;

                const publishedAt = item.publishedAt
                    ? `<span class="text-muted small">• ${item.publishedAt}</span>`
                    : '';

                const statusPill = `
                    <h6 class="status-pill m-0 ${item.statusClass || ''}">
                        ${item.statusName || '-'}
                    </h6>
                `;

                return `
                    <div class="news-item" data-name="${item.title}" data-url="/news/${item.id}">
                        <div class="d-flex align-items-start">
                            <div class="thumb me-3 d-flex align-items-center justify-content-center bg-light rounded">
                                ${thumbnail}
                            </div>
                            <div class="flex-grow-1">
                                <div class="d-flex align-items-start justify-content-between">
                                    <h6 class="news-title mb-1">${item.title}</h6>
                                    <div class="d-flex align-items-center">
                                        ${statusPill}
                                        <div class="dropdown">
                                            <button class="btn btn-link p-1 ellipsis-btn" type="button" data-bs-toggle="dropdown">
                                                <i class="bi bi-three-dots-vertical"></i>
                                            </button>
                                            <ul class="dropdown-menu dropdown-menu-end">
                                                <li>
                                                    <a class="dropdown-item" href="/contributor/edit-news/${item.id}">
                                                        <i class="bi bi-pencil me-2"></i> Edit
                                                    </a>
                                                </li>
                                                <li>
                                                    <button class="dropdown-item text-danger action-delete" data-id="${item.id}" data-type="news">
                                                        <i class="bi bi-trash me-2"></i> Delete
                                                    </button>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex flex-wrap gap-1 mb-1">
                                    <span class="badge badge-soft">
                                        <i class="bi bi-tag"></i>
                                        <span>${item.category || '-'}</span>
                                    </span>
                                    ${publishedAt}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            function renderActivityItem(item) {
                const type = item.type || '-';

                let icon = '';
                let reward = '';

                const hasReward = item.reward > 0;

                if (type === 'Student Activity Transcript') {
                    icon = `<i class="bi bi-star-fill me-1" style="color:#f59e0b;"></i>`;
                    if (hasReward) {
                        reward = `• ${item.reward} Points`;
                    }
                }
                else if (type === 'Community Service') {
                    icon = `<i class="bi bi-clock me-1" style="color:#3b82f6;"></i>`;
                    if (hasReward) {
                        reward = `• ${item.reward} Hours`;
                    }
                }

                const statusPill = `
                    <h6 class="status-pill m-0 ${item.statusClass || ''}">
                        ${item.statusName || '-'}
                    </h6>
                `;

                return `
                    <div class="news-item" data-name="${item.title}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h6 class="mb-2">${item.title}</h6>
                                <small class="text-muted d-flex align-items-center gap-1">
                                    ${icon}
                                    <span>${type}</span>
                                    ${reward ? `<span>${reward}</span>` : ''}
                                </small>
                            </div>
                            <div class="d-flex align-items-center">
                                ${statusPill}
                                <div class="dropdown">
                                    <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">
                                        <i class="bi bi-three-dots-vertical"></i>
                                    </button>
                                    <ul class="dropdown-menu dropdown-menu-end">
                                        <li>
                                            <a class="dropdown-item" href="/contributor/edit-activity/${item.id}">
                                                <i class="bi bi-pencil me-2"></i> Edit
                                            </a>
                                        </li>
                                        <li>
                                            <button class="dropdown-item text-danger action-delete"
                                                    data-id="${item.id}" data-type="activity">
                                                <i class="bi bi-trash me-2"></i> Delete
                                            </button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            $(document).on("click", ".action-delete", function () {
                let ajaxUrl = null;

                const id = $(this).data("id");
                const type = $(this).data("type");

                if (type === "news") ajaxUrl = `/contributor/news/${id}`;
                if (type === "activity") ajaxUrl = `/contributor/activities/${id}`;

                Swal.fire({
                    title: "Are you sure?",
                    text: "This action cannot be undone.",
                    icon: "warning",
                    showCancelButton: true,
                    confirmButtonText: "Delete",
                    cancelButtonText: "Cancel"
                }).then(result => {
                    if (!result.isConfirmed) return;

                    $.ajax({
                        url: ajaxUrl,
                        method: "DELETE",
                        success: function () {
                            Swal.fire({
                                icon: "success",
                                title: "Deleted!",
                                text: capitalizeFirstLetter(type) + " has been deleted.",
                                timer: 1600,
                                showConfirmButton: false
                            }).then(() => location.reload());
                        },
                        error: function (xhr) {
                            let message = "Unexpected server error.";

                            if (xhr.status === 400 && xhr.responseText) {
                                message = xhr.responseText;
                            } else if (xhr.status === 500) {
                                message = xhr.responseText || "Unexpected server error.";
                            }

                            Swal.fire({
                                icon: "error",
                                title: "Delete failed",
                                text: message
                            })
                        }
                    })
                })
            })

            $(document).ready(function () {
                const DEFAULT_TAB = "#panel-news";
                let activeTab = localStorage.getItem("activeContributorTab");

                if (!activeTab) {
                    activeTab = DEFAULT_TAB;
                    localStorage.setItem("activeContributorTab", activeTab);
                }

                const $tabBtn = $(`[data-bs-target="${activeTab}"]`);
                if ($tabBtn.length) {
                    $tabBtn.tab("show");
                }

                $('[data-bs-toggle="tab"]').on("shown.bs.tab", function (e) {
                    const target = $(e.target).data("bs-target");
                    localStorage.setItem("activeContributorTab", target);
                })
            })
        </script>
    </th:block>
</body>
</html>
