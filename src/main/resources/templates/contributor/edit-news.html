<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/panel}">
<head>
    <title>Create News</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mb-4">
            <div class="d-flex flex-wrap gap-2">
                <a th:href="@{/contributor/content}" class="btn btn-gradient" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-grid-1x2"></i> Dashboard
                </a>
                <a th:href="@{/contributor/create-news}" class="btn btn-light" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-plus-lg"></i> Create News
                </a>
                <a th:href="@{/contributor/create-activity}" class="btn btn-light" style="border:1px solid #c3c4c7;">
                    <i class="bi bi-plus-lg"></i> Create Activity
                </a>
            </div>
        </div>

        <div class="container mb-4">
            <div class="row">
                <div class="col-md-12">
                    <div class="card content-card mb-4">
                        <div class="card-body">
                            <form th:object="${news}">
                                <input type="hidden" th:field="${news.id}" id="id">
                                <div class="mb-3">
                                    <label for="title" class="form-label">Article Title<span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" th:field="${news.title}" id="title">
                                    <div id="titleError" class="invalid-feedback"></div>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="category" class="form-label">Category<span class="text-danger">*</span></label>
                                        <select class="form-select" data-placeholder="Choose" th:field="${news.category}" id="category">
                                            <option value="" disabled>Select a category</option>
                                            <option th:each="category : ${categories}" 
                                                    th:value="${category.id}" 
                                                    th:text="${category.name}">
                                        </select>
                                        <div id="categoryError" class="invalid-feedback"></div>
                                    </div>

                                    <div class="col-md-8 mb-3">
                                        <label for="featuredImage" class="form-label">Featured Image (5MB)</label>
                                        <div class="input-group">
                                            <input class="form-control" type="file" id="featuredImage" accept="image/png,image/jpeg,image/jpg,image/webp">
                                            <button class="btn btn-outline-primary d-none" type="button" id="btnPreview">
                                                <i class="bi bi-eye"></i> Preview
                                            </button>
                                            <button class="btn btn-outline-danger d-none" type="button" id="btnDelete">
                                                <i class="bi bi-trash"></i> Delete
                                            </button>
                                        </div>
                                        <input type="hidden" th:field="${news.featuredImageKey}" id="existingImageKey">
                                        <input type="hidden" th:field="${news.featuredImageUrl}" id="existingImageUrl">
                                        <div id="featuredImageError" class="invalid-feedback"></div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="summary" class="form-label">Summary<span class="text-danger">*</span></label>
                                    <textarea class="form-control" th:field="${news.summary}" id="summary" rows="3" placeholder="Write a brief summary of your article (max 200 characters)"></textarea>
                                    <div id="summaryError" class="invalid-feedback"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Article Content<span class="text-danger">*</span></label>
                                    <div id="articleEditor" style="height: 400px;"></div>
                                    <input type="hidden" th:field="${news.content}" id="articleContent">
                                    <div id="articleEditorError" class="invalid-feedback"></div>
                                </div>

                                <div class="d-flex justify-content-end gap-2 mt-4">
                                    <button type="submit" th:if="${canEdit}" id="btnSaveDraft" class="btn btn-outline-secondary">
                                        <i class="bi bi-save me-2"></i> Save as Draft
                                    </button>

                                    <button type="submit" th:if="${canEdit}" id="btnPublish" class="btn btn-purple">
                                        <i class="bi bi-check-circle me-2"></i> Publish
                                    </button>
                                </div>  
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Image Preview Modal -->
        <div class="modal fade" id="imagePreviewModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">
                    <div class="modal-body text-center">
                        <img id="imagePreview" src="" alt="Image Preview" class="img-fluid">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            const MAX_FILE_SIZE = 5 * 1024 * 1024;
            const articleEditor = new Quill("#articleEditor", quillConfig);
            const fileInput = $("#featuredImage").get(0);

            const initialContent = $("#articleContent").val();
            if (initialContent) {
                articleEditor.root.innerHTML = initialContent;
            }

            let currentImageData = { 
                key: null, 
                url: null, 
                isFromServer: false,
                shouldDelete: false 
            };

            const existingImageKey = $("#existingImageKey").val();
            const existingImageUrl = $("#existingImageUrl").val();

            if (existingImageUrl && existingImageUrl !== "" && existingImageUrl !== "null") {
                currentImageData.key = existingImageKey; 
                currentImageData.url = existingImageUrl;
                currentImageData.isFromServer = true;
                currentImageData.shouldDelete = false;

                $("#btnPreview").removeClass("d-none");
                $("#btnDelete").removeClass("d-none");
            }

            $("#btnPreview").on("click", function () {
                $("#imagePreview").attr("src", currentImageData.url);
                $("#imagePreviewModal").modal("show");
            });

            $("#btnDelete").on("click", function () {
                if (currentImageData.url && !currentImageData.isFromServer) {
                    URL.revokeObjectURL(currentImageData.url);
                } 

                currentImageData.key = null;
                currentImageData.url = null;
                currentImageData.shouldDelete = currentImageData.isFromServer;

                console.log(currentImageData)

                $("#featuredImage").val("");
                $("#imagePreview").attr("src", "");

                $("#imagePreviewModal").modal("hide");
                $("#btnPreview").addClass("d-none");
                $(this).addClass("d-none");
            });

            $("#featuredImage").on("change", function () {
                const file = this.files[0];

                if (file) {
                    const isValid = validateFile(file);
                    if (!isValid) {
                        this.value = "";
                        return;
                    }

                    clearInvalid("featuredImage");

                    if (currentImageData.url && !currentImageData.isFromServer) {
                        URL.revokeObjectURL(currentImageData.url);
                    }
                    
                    currentImageData.key = file.name; 
                    currentImageData.url = URL.createObjectURL(file);
                    currentImageData.shouldDelete = currentImageData.isFromServer;

                    $("#btnPreview").removeClass("d-none");
                    $("#btnDelete").removeClass("d-none");
                }
            });

            function setInvalid(id, message) {
                $(`#${id}`).addClass("is-invalid");
                $(`#${id}Error`).text(message);
            }

            function clearInvalid(id) {
                $(`#${id}`).removeClass("is-invalid");
                $(`#${id}Error`).text("");
            }

            function setInvalidEditor(message) {
                $("#articleEditor").addClass("is-invalid form-control").css("border", "1px solid #dc3545");
                $("#articleEditorError").text(message).addClass("d-block");
            }

            function clearInvalidEditor() {
                $("#articleEditor").removeClass("is-invalid form-control").css("border", "");
                $("#articleEditorError").text("").removeClass("d-block");
            }

            function clearValidation() {
                $(".is-invalid").removeClass("is-invalid");
                $(".invalid-feedback").text("").removeClass("d-block");
                clearInvalidEditor();
            }

            function validateFile(file) {
                let isValid = true;

                if (!file.type.startsWith("image/")) {
                    setInvalid("featuredImage", "Allowed formats: JPG, PNG, WebP");
                    isValid = false;
                } else if (file.size > MAX_FILE_SIZE) {
                    setInvalid("featuredImage", "Image size must be less than 5MB");
                    isValid = false;
                }

                return isValid;
            }

            function validatePublish() {
                let isValid = true;

                const title = $("#title").val();
                if (!title) {
                    setInvalid("title", "Title is required");
                    isValid = false;
                }

                const category = $("#category").val();
                if (!category || isNaN(category) || category === "Select a category") {
                    setInvalid("category", "Please select a valid category");
                    isValid = false;
                }

                const summary = $("#summary").val();
                if (!summary) {
                    setInvalid("summary", "Summary cannot be empty");
                    isValid = false;
                }

                const editorText = articleEditor.getText().trim();
                if (editorText.length === 0) {
                    setInvalidEditor("Summary cannot be empty");
                    isValid = false;
                }

                const file = fileInput.files[0];
                if (!file) {
                    setInvalid("featuredImage", "Featured image is required");
                    isValid = false;
                } else {
                    if (!file.type.startsWith("image")) {
                        setInvalid("featuredImage", "Allowed formats: JPG, PNG, WebP");
                        isValid = false;
                    } else if (file.size > MAX_FILE_SIZE) {
                        setInvalid("featuredImage", "Image size must be less than 5MB");
                        isValid = false;
                    }
                }

                return isValid && validateFile(file);
            }

            function validateDraft() {
                const file = fileInput.files[0];
                if (file) {
                    return validateFile(file);
                }
                return true;
            }

            function emptyToNull(value) {
                return value === "" ? null : value;
            }

            function buildPayload(isDraft) {
                const editorText = articleEditor.getText().trim();
                const editorHtml = articleEditor.root.innerHTML;

                const data = {
                    title: emptyToNull($("#title").val().trim()),
                    categoryId: $("#category").val(),
                    summary: emptyToNull($("#summary").val().trim()),
                    content: editorText.length === 0 ? null : editorHtml,
                    deleteImage: currentImageData.shouldDelete,
                    isDraft: isDraft
                }

                const formData = new FormData();
                formData.append("data", new Blob([JSON.stringify(data)], { type: "application/json" }))

                const file = fileInput.files[0];
                if (file) {
                    formData.append("featuredImage", file)
                }

                return formData;
            }

            $("input, select").on("input change", function () {
                clearInvalid(this.id);
            });

            articleEditor.on('text-change', function() {
                if (articleEditor.getText().trim().length > 0) {
                    clearInvalidEditor();
                }
            });

            $("form").on("submit", function (e) {
                e.preventDefault();
                clearValidation();

                const targetId = e.originalEvent.submitter.id;
                const isDraft = targetId === "btnSaveDraft";

                const isValid = isDraft ? validateDraft() : validatePublish();
                if (!isValid) return;

                const id = $("#id").val();
                const data = buildPayload(isDraft);

                $.ajax({
                    url: `/contributor/news/${id}`,
                    method: "PUT",
                    processData: false,
                    contentType: false,
                    data: data,
                    success: function () {
                        if (isDraft) {
                            Swal.fire({
                                icon: "success",
                                title: "Saved as Draft!",
                                text: "Your article has been saved as a draft.",
                                timer: 2000,
                                showConfirmButton: false
                            }).then(() => {
                                 window.location.href = "/contributor/content";
                            });
                        } else {
                            Swal.fire({
                                icon: "success",
                                title: "Article Published!",
                                text: "Your article has been published successfully.",
                                timer: 2000,
                                showConfirmButton: false
                            }).then(() => {
                                 window.location.href = "/contributor/content";
                            });
                        }
                    },

                    error: function (xhr) {
                        let message = "Unexpected server error.";

                        if (xhr.status === 400 && xhr.responseText) {
                            message = xhr.responseText;
                        } else if (xhr.status === 500) {
                            message = xhr.responseText || "Unexpected server error.";
                        }

                        Swal.fire({
                            icon: "error",
                            title: isDraft ? "Failed to save draft" : "Failed to publish article",
                            text: message
                        })
                    }
                })
            })
        </script>
        <style>
            #articleEditor.is-invalid .ql-toolbar,
            #articleEditor.is-invalid .ql-editor {
                border-color: #dc3545 !important;
            }

            #btnPreview, #btnDelete {
                height: 38px;
                padding: 6px 12px;
                font-size: 14px;
                border: 1px solid #ced4da;
                background-color: #f8f9fa;
                color: #000;
                cursor: pointer;
                transition: all 0.15s ease-in-out;
            }

            #btnPreview:hover {
                background-color: #e9ecef;
                border-color: #adb5bd;
            }

            #btnDelete {
                color: #000;
                background-color: #f8f9fa;
            }

            #btnDelete:hover {
                background-color: #dc3545;
                color: #fff;
            }

            #featuredImage:has(~ #btnPreview.d-none):has(~ #btnDelete.d-none) {
                border-top-right-radius: 0.375rem !important;
                border-bottom-right-radius: 0.375rem !important;
            }

            .input-group > #featuredImage:last-child {
                border-top-right-radius: 0.375rem !important;
                border-bottom-right-radius: 0.375rem !important;
            }

            @media (max-width: 576px) {
                .d-flex.gap-2 {
                    flex-wrap: wrap;
                }
                
                #featuredImage {
                    flex: 1 1 100% !important;
                }
                
                #btnPreview, #btnDelete {
                    flex: 1;
                }
            }
        </style>
    </th:block>
</body>
</html>
