<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Content Published</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            color: #1f2937;
        }

        .wrapper {
            width: 100%;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .badge.news {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .badge.activity {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .content-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin: 24px 0;
            background-color: #f9fafb;
        }

        .content-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
            margin: 0 0 12px 0;
            line-height: 1.4;
        }

        .content-description {
            font-size: 14px;
            line-height: 1.6;
            color: #6b7280;
            margin: 0 0 16px 0;
        }

        .content-meta {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 8px;
        }

        .view-button {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
        }

        a.view-button {
            color: #ffffff !important;
        }

        .button-container {
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 8px 0;
            text-align: center;
            font-weight: 600;
        }

        p {
            font-size: 15px;
            line-height: 1.6;
            margin: 0 0 16px 0;
        }

        .footer {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            margin-top: 32px;
        }
    </style>
</head>

<body>
<div class="wrapper">
    <div class="container">
        <div style="text-align: center;">
            <span th:if="${contentType == 'NEWS'}" class="badge news" th:text="${contentType}">NEWS</span>
            <span th:if="${contentType == 'ACTIVITY'}" class="badge activity" th:text="${contentType}">ACTIVITY</span>
        </div>

        <h1>New Content Published!</h1>

        <p>Hi <strong th:text="${username}">User</strong>,</p>

        <p>Fresh content has just been published that you might be interested in:</p>

        <div class="content-card">
            <div th:if="${contentType == 'ACTIVITY'}" class="content-meta">
                Organizer: <span th:text="${author}">-</span>
                <br>
                Activity Date: <span th:text="${#temporals.format(activityDate, 'dd MMMM yyyy')}">-</span>
            </div>
            <div th:if="${contentType == 'NEWS'}" class="content-meta">
                Author: <span th:text="${author}">-</span>
            </div>

            <h2 class="content-title" th:text="${contentTitle}">-</h2>

            <p class="content-description"
               th:text="${contentDescription != null ? (contentDescription.replaceAll('<[^>]+>', '').length() > 150
                       ? contentDescription.replaceAll('<[^>]+>', '').substring(0, 150) + '...'
                       : contentDescription.replaceAll('<[^>]+>', '')) : '-'}">
            </p>

            <div class="button-container">
                <a th:href="${contentUrl}" class="view-button">Read Full</a>
            </div>
        </div>

        <p style="text-align:center; font-size: 14px; color: #6b7280;">
            Stay informed with the latest updates from BiNewsian
        </p>

        <p style="text-align:center;">
            Best regards,<br>
            <strong>BiNewsian Team</strong>
        </p>

        <div class="footer">
            © 2025 BiNewsian. All rights reserved.
        </div>
    </div>
</div>
</body>
</html>
