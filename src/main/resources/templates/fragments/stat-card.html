<div th:fragment="statCard(icon, label, value, extraClass)" class="col-12 col-sm-6 col-lg-3">
    <div class="card stat-card p-3">
        <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" th:classappend="${extraClass}">
                <i class="bi" th:classappend="' ' + ${icon}"></i>
            </div>
            <div>
                <div class="text-muted small" th:text="${label}">Label</div>
                <div class="h4 mb-0" th:text="${value}">0</div>
            </div>
        </div>
    </div>
</div>
