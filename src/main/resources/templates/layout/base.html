<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">BiNewsian</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Datatables X Bootstrap -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.bootstrap5.css">
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet" />

    <style>
        .nav-link.dropdown-toggle::after {
            display: none;
        }
    </style>

    <!-- Page specific styles -->
    <th:block layout:fragment="styles"></th:block>
</head>
<body class="d-flex flex-column">
    <!-- Navbar (only if user is logged in) -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom" th:if="${session.user != null}">
        <div class="container">
            <!-- Brand on Left -->
            <a class="navbar-brand" th:href="@{/dashboard}">
                <i class="bi bi-globe"></i> BiNewsian
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Center Menu -->
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/dashboard}">
                            <i class="bi bi-house-fill"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/news}">
                            <i class="bi bi-newspaper"></i> News
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/activity}">
                            <i class="bi bi-activity"></i> Activity
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/forum}">
                            <i class="bi bi-chat-left-fill"></i> Forum
                        </a>
                    </li>
                </ul>

                <!-- Right Side - User Dropdown -->
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item dropdown">
                        <button class="nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
                            <div class="user-avatar-small" th:style="'background-color: ' + ${@userAvatar.getAvatarColor(session.user.username)}">
                                <span class="user-initials-small" th:text="${@userAvatar.getUserInitials(session.user.username)}">-</span>
                            </div>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/user/profile}">
                                    <i class="bi bi-person-fill"></i> Profile
                                </a>
                            </li>
                            <li th:if="${user.role.name() == 'USER'}">
                                <a class="dropdown-item" th:href="@{/user/bookmarks}">
                                    <i class="bi bi-bookmark"></i> Bookmarks
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/logout}">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1">
        <div layout:fragment="content">
            <!-- Page content goes here -->
        </div>

        <div layout:fragment="forumSpecificElement"></div>

        <!-- Panel Access Button -->
        <a th:if="${user.role.name() == 'CONTRIBUTOR'}" th:href="@{/contributor/content}" class="fixed-button rounded-circle contributor-panel-btn" data-bs-toggle="tooltip" data-bs-title="Contributor Panel">
            <i class="bi bi-pencil-square"></i>
        </a>
        <a th:if="${user.role.name() == 'ADMIN'}" th:href="@{/admin/panel}" class="fixed-button rounded-circle admin-panel-btn" data-bs-toggle="tooltip" data-bs-title="Administrator Panel">
            <i class="bi bi-shield-lock"></i>
        </a>
    </main>

    <!-- Footer -->
    <footer class="footer text-center text-muted">
        <div class="container">
            <small>&copy; 2025 BiNewsian. All rights reserved.</small>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <!-- Datatables -->
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.js"></script>
    <!-- Datatables X Bootstrap -->
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.bootstrap5.js"></script>
    <!-- Select2 -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Comment Script -->
    <script type="text/javascript" th:src="@{/js/commentScript.js}"></script>
    <!-- Search Script -->
    <script type="text/javascript" th:src="@{/js/searchScript.js}"></script>

    <script>
        $(document).ready(function() {
            const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
            const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))

            $(".general-select").select2();

            $('.general-select').select2().on('select2:open', function(e){
				$('.select2-search__field').attr('placeholder', 'Search here');
			})
        })

        document.addEventListener('DOMContentLoaded', function() {
            const button = document.querySelector('.fixed-button');
            const footer = document.querySelector('.footer');
            const main = document.querySelector('main');

            if (button && footer && main) {
                function adjustButtonPosition() {
                    const footerRect = footer.getBoundingClientRect();
                    const buttonRect = button.getBoundingClientRect();
                    const windowHeight = window.innerHeight;

                    if (footerRect.top < windowHeight - 20) {
                        button.classList.add('absolute-position');
                        const mainRect = main.getBoundingClientRect();
                        const buttonTop = footerRect.top - mainRect.top - buttonRect.height - 20;
                        button.style.top = buttonTop + 'px';
                    } else {
                        button.classList.remove('absolute-position');
                        button.style.top = '';
                    }
                }

                window.addEventListener('scroll', adjustButtonPosition);
                window.addEventListener('resize', adjustButtonPosition);
                adjustButtonPosition();
            }
        })
    </script>

    <!-- Page specific scripts -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
