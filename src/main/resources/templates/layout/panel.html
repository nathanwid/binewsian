<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">BiNewsian</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Datatables X Bootstrap -->
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.4/css/dataTables.bootstrap5.css">
    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <!-- Quill Editor -->
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet" />

    <style>
        body {
            min-height:100vh;
            padding-top: 73px;
        }
    </style>

    <!-- Page specific styles -->
    <th:block layout:fragment="styles"></th:block>
</head>
<body class="d-flex flex-column">
    <!-- Navbar -->
    <div class="bg-white mb-4 fixed-header">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between py-2">
                <div class="d-flex align-items-center">
                    <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Home
                    </a>
                    <span th:if="${user.role.name() == 'CONTRIBUTOR'}" class="fw-semibold text-dark ms-2">Contributor Panel</span>
                    <span th:if="${user.role.name() == 'ADMIN'}" class="fw-semibold text-dark ms-2">Administrator Panel</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div class="dropdown">
                        <button class="nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
                            <div class="user-avatar-small" th:style="'background-color: ' + ${@userAvatar.getAvatarColor(session.user.username)}">
                                <span class="user-initials-small" th:text="${@userAvatar.getUserInitials(session.user.username)}">-</span>
                            </div>
                            <span class="ms-2" th:text="${session.user.username}">-</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" th:href="@{/user/profile}">
                                    <i class="bi bi-person-fill"></i> Profile
                                </a>
                                <a class="dropdown-item" th:href="@{/logout}">
                                    <i class="bi bi-box-arrow-right"></i> Logout
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow-1">
        <div layout:fragment="content">
            <!-- Page content goes here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer text-center text-muted">
        <div class="container">
            <small>&copy; 2025 BiNewsian. All rights reserved.</small>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Jquery -->
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <!-- Datatables -->
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.js"></script>
    <!-- Datatables X Bootstrap -->
    <script src="https://cdn.datatables.net/2.3.4/js/dataTables.bootstrap5.js"></script>
    <!-- Select2 -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Quill Editor -->
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

    <script>
        var quillConfig = {
            theme: 'snow',
            placeholder: 'Write your details here...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        }

        $(document).ready(function() {
            $(".general-select").select2();

            $('.general-select').select2().on('select2:open', function(e){
                $('.select2-search__field').attr('placeholder', 'Search here');
            })
        })
    </script>

    <!-- Page specific scripts -->
    <th:block layout:fragment="scripts"></th:block>
</body>
</html>
