<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>News Detail</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container mb-4">
            <a th:href="@{/news}" class="back-link">← Back to News</a>

            <div class="news-detail" id="news-detail" th:data-news-id="${news.id}" th:data-user-id="${user.id}">
                <div class="news-detail__image">
                    <img th:src="${news.featuredImageUrl}" th:alt="${news.title}">
                    <span class="news-detail__category-badge" th:text="${news.category.name}"></span>
                </div>

                <div class="news-detail__content">
                    <h1 class="news-detail__title" th:text="${news.title}"></h1>
                    <div class="news-detail__meta">
                        <span class="date">
                            <i class="bi bi-calendar-event"></i> 
                            <span th:text="${#temporals.format(news.publishedAt, 'dd MMMM yyyy')}"></span>
                        </span>
                        <span class="author">
                            <i class="bi bi-pencil-square"></i>
                            <span th:text="${news.createdBy.username}"></span>
                        </span>
                    </div>

                    <div class="news-detail__highlight">
                        <p th:text="${news.summary}"></p>
                    </div>

                    <div class="news-detail__body" th:utext="${news.content}"></div>

                    <div class="news-detail__tags">
                        <span class="news-detail__tag-label"><i class="bi bi-tag"></i>Tags:</span>
                        <span class="news-detail__tag" th:text="${news.category.name}">Tag</span>
                    </div>

                    <div class="news-detail__action-buttons">
                        <button class="news-detail__btn-outline btn-light">
                            <i class="bi bi-bookmark me-1"></i>Save News
                        </button>
                        <a th:href="@{/news}" class="news-detail__btn-primary">See Other News</a>
                    </div>
                </div>
            </div>

            <!-- Comments Section -->
            <div class="comments-section">
                <h2>Comments</h2>

                <!-- Comment Container -->
                <div id="comments-container"></div>

                <!-- Pagination -->
                <nav id="comment-pagination" class="mt-4" style="display: none;">
                    <ul class="pagination justify-content-center" id="pagination-list"></ul>
                </nav>

                <!-- Comment Form -->
                <div class="comment-form">
                    <h3>Write a Comment</h3>
                    <form id="comment-form">
                        <textarea id="comment-content" name="content" placeholder="Share your thoughts on this news..." required></textarea>
                        <button type="submit" class="btn-submit" id="btnComment" disabled>📤 Send</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script th:inline="javascript">
            const $newsDetail = $("#news-detail");
            const newsId = $newsDetail.data('news-id');
            const userId = $newsDetail.data('user-id');

            let currentPage = 0;
            const pageSize = 5;

            $(document).ready(function() {
                loadComments(0);
            });

            const $commentContent = $("#comment-content");
            $commentContent.on("input", function() {
                const hasValue = $commentContent.val().trim().length > 0;
                $("#btnComment").prop("disabled", !hasValue);
            });

            // Load comments with pagination
            function loadComments(page) {
                $.ajax({
                    url: "/comments",
                    method: 'GET',
                    data: {
                        contentId: newsId,
                        contentType: "NEWS",
                        page: page,
                        size: pageSize
                    },
                    success: function(response) {
                        renderComments(response.comments);
                        updatePagination(response);
                    },
                    error: function(error) {
                        console.error('Error loading comments:', error);
                        $('#comment-list').html('<p style="text-align:center;color:#a0aec0;">Failed to load comments</p>');
                    }
                });
            }

            // Render comments
            function renderComments(comments) {
                const $commentsContainer = $('#comments-container');
                
                if (comments.length === 0) {
                    $commentsContainer.html('<p style="text-align:center;padding:40px;color:#a0aec0;">No comments yet. Be the first to comment!</p>');
                    return;
                }

                $commentsContainer.empty();
                
                comments.forEach(comment => {
                    const commentHtml = createCommentHtml(comment);
                    $commentsContainer.append(commentHtml);
                });
            }

            // Create reply HTML
            function createReplyHtml(reply) {
                const avatar = reply.user.username.charAt(0).toUpperCase();
                const date = formatDate(reply.createdAt);
                const isEdited = reply.createdAt != reply.updatedAt;
                const isOwner = reply.user.id === userId;

                return `
                    <div class="reply-item" data-item-id="${reply.id}" data-item-type="reply">
                        <div class="reply-avatar">${avatar}</div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <strong>${reply.user.username}</strong>
                                <span class="comment-date">${date} ${isEdited ? '(edited)' : ''}</span>
                                ${isOwner ? createDropdownMenu(reply.id, 'reply') : ''}
                            </div>
                            ${createEditableContent(reply.content, reply.id, 'reply')}
                        </div>
                    </div>
                `;
            }

            // Create comment HTML
            function createCommentHtml(comment) {
                const isDeleted = comment.deleted || comment.user === null;
                const username = isDeleted ? '[?]' : comment.user.username;
                const avatar = isDeleted ? '?' : username.charAt(0).toUpperCase();
                const date = formatDate(comment.createdAt);
                const isEdited = !isDeleted && (comment.createdAt != comment.updatedAt);
                const isOwner = !isDeleted && (comment.user?.id === userId);
                
                return `
                    <div class="comment" data-item-id="${comment.id}" data-item-type="comment">
                        <div class="comment-avatar" style="${isDeleted ? 'background: #ccc;' : ''}">${avatar}</div>
                        <div class="comment-content">
                            <div class="comment-header">
                                <strong>${username}</strong>
                                <span class="comment-date">${date} ${isEdited ? '(edited)' : ''}</span>
                                ${isOwner ? createDropdownMenu(comment.id, 'comment') : ''}
                            </div>
                            ${createEditableContent(comment.content, comment.id, 'comment', isDeleted)}
                            <div class="comment-actions">
                                ${!isDeleted ? `
                                    <button class="comment-action-btn" onclick="toggleReplyForm(${comment.id})">
                                        💬 Reply
                                    </button>
                                ` : ''}
                                ${comment.replyCount > 0 ? `
                                    <button class="comment-action-btn" id="load-replies-${comment.id}" 
                                            onclick="toggleReplies(${comment.id})"
                                            data-count="${comment.replyCount}">
                                        View replies (${comment.replyCount})
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                    <div id="reply-form-${comment.id}" class="reply-form">
                        <textarea id="reply-text-${comment.id}" placeholder="Write your reply..."></textarea>
                        <div class="reply-form-actions">
                            <button class="btn-cancel" onclick="toggleReplyForm(${comment.id})">Cancel</button>
                            <button class="btn-reply" onclick="submitReply(${comment.id})">Reply</button>
                        </div>
                    </div>
                    <div id="replies-container-${comment.id}" class="replies-wrapper" style="display:none;">
                        <div class="replies-list"></div>
                        <div class="load-more-replies" style="display:none; text-align: center; padding: 10px;">
                            <button class="btn-load-more" onclick="loadReplies(${comment.id})">Load more replies...</button>
                        </div>
                    </div>
                `;
            }

            // Helper function untuk membuat dropdown menu
            function createDropdownMenu(id, type) {
                return `
                    <div class="dropdown ms-auto">
                        <button class="btn btn-link p-1 ellipsis-btn" data-bs-toggle="dropdown">
                            <i class="bi bi-three-dots-vertical"></i>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <button class="dropdown-item" onclick="editItem(${id}, '${type}')">
                                    <i class="bi bi-pencil me-2"></i> Edit
                                </button>
                            </li>
                            <li>
                                <button class="dropdown-item text-danger" onclick="deleteItem(${id}, '${type}')">
                                    <i class="bi bi-trash me-2"></i> Delete
                                </button>
                            </li>
                        </ul>
                    </div>
                `;
            }

            // Helper function untuk membuat editable content
            function createEditableContent(content, id, type, isDeleted = false) {
                const displayContent = isDeleted ? 'This comment has been deleted.' : escapeHtml(content);
                const textClass = isDeleted ? 'comment-text text-muted italic' : 'comment-text';

                return `
                    <div class="comment-text-container">
                        <p class="${textClass}">${displayContent}</p>
                        
                        ${!isDeleted ? `
                            <div class="comment-edit-form" style="display:none;">
                                <textarea class="edit-textarea">${escapeHtml(content)}</textarea>
                                <div class="edit-form-actions">
                                    <button class="btn-cancel" onclick="cancelEdit(${id}, '${type}')">Cancel</button>
                                    <button class="btn-save" onclick="saveItem(${id}, '${type}')">Save</button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }

            // Unified edit function
            function editItem(id, type) {
                const $itemEl = $(`[data-item-id="${id}"][data-item-type="${type}"]`);
                const $textContainer = $itemEl.find('.comment-text-container');
                
                $textContainer.find('.comment-text').hide();
                $textContainer.find('.comment-edit-form').show();
                $textContainer.find('.edit-textarea').focus();
            }

            // Unified cancel edit function
            function cancelEdit(id, type) {
                const $itemEl = $(`[data-item-id="${id}"][data-item-type="${type}"]`);
                const $textContainer = $itemEl.find('.comment-text-container');
                
                $textContainer.find('.comment-text').show();
                $textContainer.find('.comment-edit-form').hide();
            }

            // Unified save function
            function saveItem(id, type) {
                const $itemEl = $(`[data-item-id="${id}"][data-item-type="${type}"]`);
                const $textContainer = $itemEl.find('.comment-text-container');
                const $editForm = $textContainer.find('.comment-edit-form');
                const newContent = $editForm.find('.edit-textarea').val().trim();
                
                if (!newContent) {
                    alert(`${type.charAt(0).toUpperCase() + type.slice(1)} cannot be empty`);
                    return;
                }
                
                $.ajax({
                    url: `/comments/${id}`,
                    method: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify({ content: newContent }),
                    success: function(response) {
                        const $textEl = $textContainer.find('.comment-text');
                        $textEl.text(newContent).show();
                        $editForm.hide();
                    },
                    error: function(xhr, status, error) {
                        console.error(`Error updating ${type}:`, error);
                        alert(`Failed to update ${type}`);
                    }
                });
            }

            function deleteItem(id, type) {
                const $itemEl = $(`[data-item-id="${id}"][data-item-type="${type}"]`);

                $.ajax({
                    url: `/comments/${id}`,
                    method: 'DELETE',
                    success: function(response) {
                        if (type === 'comment') {
                            const $btnReplies = $(`#load-replies-${id}`);
                            const hasReplies = $btnReplies.length > 0;

                            if (hasReplies) {
                                $itemEl.find('.comment-text').text('This comment has been deleted.').addClass('text-muted italic');
                                $itemEl.find('.comment-avatar').text('?').css('background', '#ccc');
                                $itemEl.find('strong').text('[Deleted User]');
                                
                                $itemEl.find('.dropdown').remove(); 
                                $itemEl.find('button[onclick^="toggleReplyForm"]').remove();
                                
                            } else {
                                $(`#reply-form-${id}, #replies-container-${id}`).remove();
                                $itemEl.fadeOut(300, function() { $(this).remove(); });
                            }
                        } else {
                            $itemEl.fadeOut(300, function() { 
                                $(this).remove(); 
                                updateParentReplyCount(id, -1);
                            });
                        }
                    },
                    error: function(xhr) {
                        alert(xhr.responseText || `Failed to delete ${type}`);
                    }
                });
            }

            // Toggle reply form
            function toggleReplyForm(commentId) {
                const $replyForm = $(`#reply-form-${commentId}`);
                const isActive = $replyForm.hasClass('active');
                
                $('.reply-form.active').removeClass('active');
                
                if (!isActive) {
                    $replyForm.addClass('active');
                    $(`#reply-text-${commentId}`).focus();
                }
            }

            // Toggle replies visibility
            function toggleReplies(commentId) {
                const $container = $(`#replies-container-${commentId}`);
                const $button = $(`#load-replies-${commentId}`);

                const count = parseInt($button.data('count')) || 0;

                if ($container.is(':visible')) {
                    $container.slideUp();
                    $button.text(`View replies (${count})`);
                } else {
                    $container.slideDown();

                    if ($(`#replies-container-${commentId} .replies-list`).is(':empty')) {
                        loadReplies(commentId, 0);
                    }

                    $button.text('Hide replies');
                }
            }

            // Load replies
           function loadReplies(commentId, page = 0, isAppend = true) {
                const $container = $(`#replies-container-${commentId}`);
                const $list = $container.find('.replies-list');
                const $btnMore = $container.find('.load-more-replies');
                
                $.ajax({
                    url: `/comments/${commentId}/replies`,
                    data: { page: page, size: 5 },
                    success: function(response) {
                        if (!isAppend) $list.empty();

                        response.replies.forEach(reply => {
                            $list.append(createReplyHtml(reply));
                        });

                        if (response.currentPage < response.totalPages - 1) {
                            $btnMore.show();
                            $btnMore.find('button').attr('onclick', `loadReplies(${commentId}, ${response.currentPage + 1})`);
                        } else {
                            $btnMore.hide();
                        }
                    }
                });
            }

            // Submit reply
            function submitReply(commentId) {
                const $form = $(`#reply-form-${commentId}`);
                const content = $form.find('textarea').val().trim();
                
                if (!content) {
                    alert('Please enter your reply');
                    return;
                }
                
                $.ajax({
                    url: '/comments',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ content: content, contentId: newsId, contentType: "NEWS", parentId: commentId }),
                    success: function(response) {
                        $form.find('textarea').val('');
                        toggleReplyForm(commentId);

                        const $container = $(`#replies-container-${commentId}`);
                        $container.show(); 

                        let $button = $(`#load-replies-${commentId}`);
                        
                        if ($button.length === 0) {
                            const newButtonHtml = `
                                <button class="comment-action-btn" id="load-replies-${commentId}" 
                                        onclick="toggleReplies(${commentId})"
                                        data-count="1">
                                    Hide replies
                                </button>`;
                            $(`[data-item-id="${commentId}"] .comment-actions`).append(newButtonHtml);
                        } else {
                            const count = parseInt($button.data('count')) || 0;
                            const newCount = count + 1;
                            $button.data('count', newCount);

                            if (!$container.is(':visible')) {
                                $button.text(`View replies (${newCount})`);
                            }
                        }
                        
                        $container.slideDown();
                        loadReplies(commentId, 0, false);
                    },
                    error: function(error) {
                        console.error('Error posting reply:', error);
                        alert('Failed to post reply. Please try again.');
                    }
                });
            }

            // Update pagination
            function updatePagination(response) {
                const $paginationNav = $('#comment-pagination');
                const $paginationList = $('#pagination-list');
                
                $paginationList.empty();

                if (response.totalPages <= 1) {
                    $paginationNav.hide();
                    return;
                }

                $paginationNav.show();
                const currentPage = response.currentPage; 
                const totalPages = response.totalPages;

                const hasPrevious = currentPage > 0;
                const prevDisabled = !hasPrevious ? 'disabled' : '';
                
                $paginationList.append(`
                    <li class="page-item ${prevDisabled}">
                        <a class="page-link" href="javascript:void(0)" 
                        onclick="${hasPrevious ? `loadComments(${currentPage - 1})` : ''}">
                        &laquo;
                        </a>
                    </li>
                `);

                for (let i = 0; i < totalPages; i++) {
                    const activeClass = (i === currentPage) ? 'active' : '';

                    $paginationList.append(`
                        <li class="page-item ${activeClass}">
                            <a class="page-link" href="javascript:void(0)" onclick="loadComments(${i})">
                                ${i + 1}
                            </a>
                        </li>
                    `);
                }

                const hasNext = currentPage < totalPages - 1;
                const nextDisabled = !hasNext ? 'disabled' : '';

                $paginationList.append(`
                    <li class="page-item ${nextDisabled}">
                        <a class="page-link" href="javascript:void(0)" 
                        onclick="${hasNext ? `loadComments(${currentPage + 1})` : ''}">
                        &raquo;
                        </a>
                    </li>
                `);
            }

            // Submit comment
            $('#comment-form').on('submit', function(e) {
                e.preventDefault();
                
                const content = $('#comment-content').val().trim();
                
                if (!content) {
                    alert('Please enter your comment');
                    return;
                }
                
                $.ajax({
                    url: '/comments',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ content: content, contentId: newsId, contentType: "NEWS", parentId: null }),
                    success: function(response) {
                        $('#comment-content').val('');
                        loadComments(0);
                    },
                    error: function(error) {
                        console.error('Error posting comment:', error);
                        alert('Failed to post comment. Please try again.');
                    }
                });
            });

            // Format date
            function formatDate(dateString) {
                const date = new Date(dateString);
                const options = { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                };
                return date.toLocaleDateString('en-US', options);
            }

            // Escape HTML to prevent XSS
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            /*]]>*/
        </script>
    </th:block>
</body>
</html>
