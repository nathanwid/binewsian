<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>News Detail</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container pt-4 pb-5">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}" class="text-decoration-none">Home</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/news}" class="text-decoration-none">News</a></li>
                    <li class="breadcrumb-item active">Detail</li>
                </ol>
            </nav>

            <div class="news-detail" id="news-detail" th:data-news-id="${news.id}" th:data-user-id="${user.id}" th:data-user-role="${user.role}">
                <div class="news-detail__image">
                    <img th:src="${news.featuredImageUrl}" th:alt="${news.title}">
                    <span class="news-detail__category-badge" th:text="${news.category.name}"></span>
                </div>

                <div class="news-detail__content">
                    <h1 class="news-detail__title" th:text="${news.title}"></h1>
                    <div class="news-detail__meta">
                        <span class="date">
                            <i class="bi bi-calendar"></i>
                            <span th:text="${#temporals.format(news.publishedAt, 'dd MMMM yyyy')}"></span>
                        </span>
                        <span class="author">
                            <i class="bi bi-pencil-square"></i>
                            <span th:text="${news.createdBy.username}"></span>
                        </span>
                    </div>

                    <div class="news-detail__highlight">
                        <p th:text="${news.summary}"></p>
                    </div>

                    <div class="news-detail__body" th:utext="${news.content}"></div>

                    <div class="news-detail__tags">
                        <span class="news-detail__tag-label"><i class="bi bi-tag"></i>Tags:</span>
                        <span class="news-detail__tag" th:text="${news.category.name}">Tag</span>
                    </div>

                    <div class="news-detail__action-buttons">
                        <button th:if="${user.role.name == 'USER'}" class="news-detail__btn-bookmark" id="saveNewsBtn" th:data-id="${news.id}" th:data-type="'NEWS'">
                            <i class="bi" th:classappend="${isBookmarked} ? 'bi-bookmark-fill' : 'bi-bookmark'"></i>
                            <span class="save-text" th:text="${isBookmarked} ? 'Saved' : 'Save News'"></span>
                        </button>
                        <a th:href="@{/news}" class="news-detail__btn-primary">See Other News</a>
                    </div>
                </div>
            </div>

            <!-- Comments Section -->
            <div class="comments-section">
                <h2>Comments</h2>
                <div id="comments-container"></div>
                <div class="text-center mt-4">
                    <button id="load-more-comments" class="btn btn-load-more" onclick="loadComments()" style="display:none;">
                        Load more comments...
                    </button>
                </div>
                <div class="comment-form">
                    <h3>Write a Comment</h3>
                    <form id="comment-form">
                        <textarea class="comment-input" id="comment-content" name="content" placeholder="Share your thoughts on this news..." required></textarea>
                        <button type="submit" class="btn-submit" id="btnComment" disabled>
                            <i class="bi bi-send-fill me-2"></i> Send
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            const $contentDetail = $("#news-detail");
            const contentId = $contentDetail.data('news-id');
            const contentType = "NEWS";
            const userId = $contentDetail.data('user-id');
            const userRole = $contentDetail.data('user-role');

            $(document).ready(function () {
                $('#saveNewsBtn').on('click', function () {
                    const $btn = $(this);
                    const contentId = $btn.data('id');
                    const contentType = $btn.data('type');

                    $.ajax({
                        url: '/user/bookmarks/toggle',
                        method: 'POST',
                        data: {
                            contentId: contentId,
                            type: contentType
                        },
                        success: function (res) {
                            const $icon = $btn.find('i');

                            if (res.saved) {
                                $icon.removeClass('bi-bookmark').addClass('bi-bookmark-fill');
                                $btn.find('.save-text').text('Saved');

                                Swal.fire({
                                    icon: 'success',
                                    title: 'Saved',
                                    text: 'News added to bookmarks',
                                    timer: 1500,
                                    showConfirmButton: false
                                })
                            } else {
                                $icon.removeClass('bi-bookmark-fill').addClass('bi-bookmark');
                                $btn.find('.save-text').text('Save News');

                                Swal.fire({
                                    icon: 'info',
                                    title: 'Removed',
                                    text: 'Bookmark removed',
                                    timer: 1500,
                                    showConfirmButton: false
                                })
                            }
                        },
                        error: function () {
                            Swal.fire({
                                icon: 'error',
                                title: 'Error',
                                text: 'Unexpected server error.'
                            })
                        }
                    })
                })

                loadComments();
            })
        </script>
    </th:block>
</body>
</html>
