<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/auth}">
<head>
    <title>Register</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="auth-header">
            <h2 class="mb-0">Registrasi</h2>
        </div>

        <div class="auth-body">
            <!-- Alert Messages -->
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Register Form -->
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required autofocus th:value="${username}">
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required th:value="${email}">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6">
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="btn btn-auth w-100 mb-3">
                    <i class="bi bi-person-plus-fill"></i> Daftar
                </button>

                <div class="text-center">
                    <p class="mb-0">
                        Sudah punya akun?
                        <a th:href="@{/login}" class="auth-link">Login di sini</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
