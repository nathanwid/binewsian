<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="${thread.title}">Thread</title>
</head>

<body>
<div layout:fragment="content">
    <main class="container pt-4 pb-5" style="max-width: 900px;">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/dashboard}" class="text-decoration-none">Home</a></li>
                <li class="breadcrumb-item"><a th:href="@{/forum}" class="text-decoration-none">Forum</a></li>
                <li class="breadcrumb-item active">Thread</li>
            </ol>
        </nav>

        <div id="thread-detail"
             th:data-thread-id="${thread.id}"
             th:data-user-id="${user.id}"
             th:data-user-role="${user.role}">
        </div>

        <!-- THREAD CARD -->
        <div class="content-card p-4" style="border-radius:8px;">
            <h2 class="mb-1" th:text="${thread.title}">Title</h2>

            <div class="text-muted" style="font-size:14px;">
                <span th:text="${#temporals.format(thread.createdAt, 'dd MMM yyyy HH:mm')}">date</span>
                <span> • </span>
                <span th:text="${thread.createdBy != null ? thread.createdBy.username : 'User'}">Author</span>
            </div>

            <p class="mt-3 mb-0" th:text="${thread.content}">Content</p>

            <!-- ACTIONS: VOTE + SAVE -->
            <div class="d-flex gap-2 mt-3 align-items-center">
                <button type="button" class="btn btn-sm btn-outline-success" id="btnUpvote">
                    <i class="bi bi-hand-thumbs-up"></i>
                    <span id="upvoteCount" th:text="${upvoteCount}">0</span>
                </button>

                <button type="button" class="btn btn-sm btn-outline-danger" id="btnDownvote">
                    <i class="bi bi-hand-thumbs-down"></i>
                    <span id="downvoteCount" th:text="${downvoteCount}">0</span>
                </button>

                <button th:if="${user.role.name == 'USER'}" type="button" class="btn btn-sm btn-outline-warning ms-auto" id="saveForumBtn">
                    <i class="bi" th:classappend="${isSaved} ? 'bi-bookmark-fill' : 'bi-bookmark'"></i>
                    <span class="save-text" th:text="${isSaved} ? 'Saved' : 'Save'">Save</span>
                </button>
            </div>
        </div>

        <!-- Comment Section -->
        <div class="comments-section mt-4">
            <h2>Comments</h2>
            <div id="comments-container"></div>
            <div class="text-center mt-4">
                <button id="load-more-comments" class="btn btn-load-more" onclick="loadComments()" style="display:none;">
                    Load more comments...
                </button>
            </div>
            <div class="comment-form">
                <h3>Write a Comment</h3>
                <form id="comment-form">
                    <textarea class="comment-input" id="comment-content" name="content" placeholder="Share your thoughts on this thread..." required></textarea>
                    <button type="submit" class="btn-submit" id="btnComment" disabled>
                        <i class="bi bi-send-fill me-2"></i> Send
                    </button>
                </form>
            </div>
        </div>
    </main>
</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        const $contentDetail = $("#thread-detail");
        const contentId = $contentDetail.data('thread-id');
        const contentType = "THREAD";
        const userId = $contentDetail.data('user-id');
        const userRole = $contentDetail.data('user-role');
        const initialUserVote = /*[[${userVote}]]*/ null;

        $(document).ready(function () {
            loadComments();
        })

        $(function () {
            function setVoteUI(userVote) {
                $('#btnUpvote').toggleClass('btn-success', userVote === 'UP')
                               .toggleClass('btn-outline-success', userVote !== 'UP');

                $('#btnDownvote').toggleClass('btn-danger', userVote === 'DOWN')
                                 .toggleClass('btn-outline-danger', userVote !== 'DOWN');
            }

            setVoteUI(initialUserVote);

            $('#btnUpvote').on('click', function () {
                $.post('/forum/' + contentId + '/vote', { type: 'UP' })
                    .done(function (res) {
                        $('#upvoteCount').text(res.upvotes);
                        $('#downvoteCount').text(res.downvotes);
                        setVoteUI(res.userVote);
                    })
                    .fail(function () {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to upvote.' });
                    });
            });

            $('#btnDownvote').on('click', function () {
                $.post('/forum/' + contentId + '/vote', { type: 'DOWN' })
                    .done(function (res) {
                        $('#upvoteCount').text(res.upvotes);
                        $('#downvoteCount').text(res.downvotes);
                        setVoteUI(res.userVote);
                    })
                    .fail(function () {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to downvote.' });
                    });
            });

            $('#saveForumBtn').on('click', function () {
                $.post('/user/bookmarks/toggle', { contentId: contentId, type: contentType })
                    .done(function (res) {
                        const $icon = $('#saveForumBtn i');
                        if (res.saved) {
                            $icon.removeClass('bi-bookmark').addClass('bi-bookmark-fill');
                            $('.save-text').text('Saved');

                            Swal.fire({
                                icon: 'success',
                                title: 'Saved',
                                text: 'Forum added to bookmarks',
                                timer: 1500,
                                showConfirmButton: false
                            })
                        } else {
                            $icon.removeClass('bi-bookmark-fill').addClass('bi-bookmark');
                            $('.save-text').text('Save');

                            Swal.fire({
                                icon: 'info',
                                title: 'Removed',
                                text: 'Bookmark removed',
                                timer: 1500,
                                showConfirmButton: false
                            })
                        }
                    })
                    .fail(function () {
                        Swal.fire({ icon: 'error', title: 'Error', text: 'Failed to save thread.' });
                    });
            });
        });
    </script>
</th:block>

</body>
</html>
