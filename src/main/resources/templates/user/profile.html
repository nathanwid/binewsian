<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>User Profile</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container pt-4 pb-5">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}" class="text-decoration-none">Dashboard</a></li>
                    <li class="breadcrumb-item active">Profile</li>
                </ol>
            </nav>

            <div class="row">
                <div class="col-lg-4 mb-4">
                    <!-- Profile Card -->
                    <div class="card card-custom animate-fade-in">
                        <div class="card-body text-center p-4">
                            <div class="d-flex">
                                <div class="user-avatar" th:style="'background-color: ' + ${@userAvatar.getAvatarColor(user.username)}">
                                    <span class="user-initials" th:text="${@userAvatar.getUserInitials(user.username)}">-</span>
                                </div>
                                <div class="ms-3 text-start align-self-center">
                                    <h5 class="mb-2" th:text="${user.username}">-</h5>
                                    <span class="badge badge-custom role-badge-user"
                                          th:text="${user.role.name() == 'USER' ? 'Binusian' : #strings.capitalize(#strings.toLowerCase(user.role.name()))}">
                                    </span>
                                </div>
                            </div>
                            <hr>
                            <div class="text-start">
                                <div id="bookmarkBtn">
                                    <div th:insert="~{fragments/profile-menu-btn :: iconButton('bi-bookmark', 'Bookmark')}"></div>
                                </div>
                                <div data-bs-toggle="modal" data-bs-target="#editProfileModal">
                                    <div th:insert="~{fragments/profile-menu-btn :: iconButton('bi-pencil-square', 'Edit Profile')}"></div>
                                </div>
                                <div data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                                    <div th:insert="~{fragments/profile-menu-btn :: iconButton('bi-key', 'Change Password')}"></div>
                                </div>
                                <a th:href="@{/logout}" style="text-decoration: none;">
                                    <div th:replace="~{fragments/profile-menu-btn :: iconButton('bi-box-arrow-right', 'Logout')}"></div>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <!-- Account Information -->
                    <div class="card card-custom mb-4 animate-fade-in" style="animation-delay: 0.1s;">
                        <div class="card-body">
                            <h5 class="card-title mb-4">
                                <i class="bi bi-info-circle-fill text-primary me-2"></i>
                                Account Information
                            </h5>

                            <div class="d-flex align-items-center mb-3">
                                <div class="d-flex align-items-center text-muted" style="min-width: 160px;">
                                    <i class="bi bi-person-fill me-2"></i>
                                    <span>Username</span>
                                </div>
                                <div class="ms-3">
                                    <h6 class="mb-0 fw-semibold" th:text="${user.username}">-</h6>
                                </div>
                            </div>

                            <div class="d-flex align-items-center mb-3">
                                <div class="d-flex align-items-center text-muted" style="min-width: 160px;">
                                    <i class="bi bi-envelope-fill me-2"></i>
                                    <span>Email</span>
                                </div>
                                <div class="ms-3">
                                    <h6 class="mb-0 fw-semibold" th:text="${user.email}">-</h6>
                                </div>
                            </div>

                            <div class="d-flex align-items-center">
                                <div class="d-flex align-items-center text-muted" style="min-width: 160px;">
                                    <i class="bi bi-calendar-plus me-2"></i>
                                    <span>Joined Since</span>
                                </div>
                                <div class="ms-3">
                                    <h6 class="mb-0 fw-semibold"th:text="${#temporals.format(user.createdAt, 'dd MMMM yyyy')}">-</h6>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Change Password Modal -->
        <div class="modal fade" id="changePasswordModal" tabindex="-1" aria-labelledby="changePasswordModal" aria-hidden="true" data-bs-backdrop="static">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="changePasswordLabel">Change Password</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label">Old Password</label>
                            <input type="password" class="form-control" id="oldPassword">
                            <div id="oldPasswordError" class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newPassword" class="form-label">New Password</label>
                            <input type="password" class="form-control" id="newPassword">
                            <div id="newPasswordError" class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword">
                            <div id="confirmPasswordError" class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button id="btnChangePassword" class="btn btn-purple">
                            <span class="btn-text">Change</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Profile Modal -->
        <div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModal" aria-hidden="true" data-bs-backdrop="static">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="editProfileLabel">Edit Profile</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" th:value="${user.username}">
                            <div id="usernameError" class="invalid-feedback"></div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" th:value="${user.email}">
                            <div id="emailError" class="invalid-feedback"></div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button id="btnEditProfile" class="btn btn-purple">
                            <span class="btn-text">Edit</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script>
            let originalUsername = $("#username").val();
            let originalEmail = $("#email").val();

            $("#btnChangePassword").on("click", function () {
                const $btn = $("#btnChangePassword");
                const $btnText = $btn.find(".btn-text");
                const $spinner = $btn.find(".spinner-border");

                const oldPassword = $("#oldPassword").val();
                const newPassword = $("#newPassword").val();
                const confirmPassword = $("#confirmPassword").val();

                let hasError = false;
                let isNewPasswordValid = true;

                if (oldPassword === "") {
                    $("#oldPassword").addClass("is-invalid");
                    $("#oldPasswordError").text("Old password is required");
                    hasError = true;
                } else if (oldPassword.length < 6) {
                    $("#oldPassword").addClass("is-invalid");
                    $("#oldPasswordError").text("Old password must be at least 6 characters");
                    hasError = true;
                }

                if (newPassword === "") {
                    $("#newPassword").addClass("is-invalid");
                    $("#newPasswordError").text("New password is required");
                    hasError = true;
                    isNewPasswordValid = false;
                } else if (newPassword.length < 6) {
                    $("#newPassword").addClass("is-invalid");
                    $("#newPasswordError").text("New password must be at least 6 characters");
                    hasError = true;
                    isNewPasswordValid = false;
                }

                if (confirmPassword === "") {
                    $("#confirmPassword").addClass("is-invalid");
                    $("#confirmPasswordError").text("Confirm password is required");
                    hasError = true;
                }

                if (isNewPasswordValid && newPassword !== confirmPassword) {
                    $("#confirmPassword").addClass("is-invalid");
                    $("#confirmPasswordError").text("Confirm password must match new password");
                    hasError = true;
                }

                if (hasError) return;

                $btn.prop("disabled", true);
                $btnText.text("Changing...");
                $spinner.removeClass("d-none");

                $.ajax({
                    url: "/user/change-password",
                    type: "POST",
                    data: {
                        oldPassword: oldPassword,
                        newPassword: newPassword,
                        confirmPassword: confirmPassword
                    },
                    success: function () {
                        $("#changePasswordModal").modal("hide");

                        $("#changePasswordModal").one("hidden.bs.modal", function () {
                            Swal.fire({
                                icon: "success",
                                title: "Changed!",
                                text: "Your password successfully changed!",
                                timer: 1600,
                                showConfirmButton: false
                            });

                            resetChangePasswordForm();
                        });
                    },
                    error: function (xhr) {
                        if (xhr.status === 400) {
                            const message = xhr.responseText;

                            $("#oldPassword, #newPassword, #confirmPassword").removeClass("is-invalid");
                            $("#oldPasswordError, #newPasswordError, #confirmPasswordError").text("");

                            if (message.includes("Old")) {
                                $("#oldPassword").addClass("is-invalid");
                                $("#oldPasswordError").text(message);
                            } else if (message.includes("New")) {
                                $("#newPassword").addClass("is-invalid");
                                $("#newPasswordError").text(message);
                            }
                        } else {
                            Swal.fire({
                                icon: "error",
                                title: "Failed to change password",
                                text: xhr.responseText || "Unknown error"
                            });
                        }
                    },
                    complete: function () {
                        $btn.prop("disabled", false);
                        $btnText.text("Change");
                        $spinner.addClass("d-none");
                    }
                })
            })

            $("#btnEditProfile").on("click", function () {
                const $btn = $(this);
                const $btnText = $btn.find(".btn-text");
                const $spinner = $btn.find(".spinner-border");

                const username = $("#username").val().trim();
                const email = $("#email").val().trim();

                let hasError = false;

                $("#username, #email").removeClass("is-invalid");
                $("#usernameError, #emailError").text("");

                if (!username) {
                    $("#username").addClass("is-invalid");
                    $("#usernameError").text("Username is required");
                    hasError = true;
                } else if (username.length < 3) {
                    $("#username").addClass("is-invalid");
                    $("#usernameError").text("Username must be at least 3 characters");
                    hasError = true;
                }

                if (!email) {
                    $("#email").addClass("is-invalid");
                    $("#emailError").text("Email is required");
                    hasError = true;
                } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                    $("#email").addClass("is-invalid");
                    $("#emailError").text("Invalid email format");
                    hasError = true;
                }

                if (hasError) return;

                $btn.prop("disabled", true);
                $btnText.addClass("d-none");
                $spinner.removeClass("d-none");

                $.ajax({
                    url: "/user/edit-profile",
                    type: "POST",
                    data: {
                        username: username,
                        email: email
                    },
                    success: function () {
                        $("#editProfileModal").modal("hide");

                        Swal.fire({
                            icon: 'success',
                            title: 'Success!',
                            text: 'Profile updated successfully',
                            timer: 1600,
                            showConfirmButton: false
                        }).then(() => {
                            location.reload();
                        });
                    },
                    error: function (xhr) {
                        const errorMessage = xhr.responseText || "Failed to update profile";

                        if (errorMessage.toLowerCase().includes("username")) {
                            $("#username").addClass("is-invalid");
                            $("#usernameError").text(errorMessage);
                        } else if (errorMessage.toLowerCase().includes("email")) {
                            $("#email").addClass("is-invalid");
                            $("#emailError").text(errorMessage);
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: 'Error!',
                                text: errorMessage,
                                confirmButtonText: 'OK'
                            });
                        }
                    },
                    complete: function () {
                        $btn.prop("disabled", false);
                        $btnText.removeClass("d-none");
                        $spinner.addClass("d-none");
                    }
                });
            });

            $("#oldPassword, #newPassword, #confirmPassword").on("input", function () {
                $(this).removeClass("is-invalid");

                if (this.id === "oldPassword") $("#oldPasswordError").text("");
                if (this.id === "newPassword") $("#newPasswordError").text("");
                if (this.id === "confirmPassword") $("#confirmPasswordError").text("");
            })

            $("#username, #email").on("input", function () {
                $(this).removeClass("is-invalid");

                if (this.id === "username") $("#usernameError").text("");
                if (this.id === "email") $("#emailError").text("");
            });

            $("#changePasswordModal").on("hidden.bs.modal", function () {
                resetChangePasswordForm();
            })

            $("#editProfileModal").on("hidden.bs.modal", function () {
                $("#username").val(originalUsername);
                $("#email").val(originalEmail);

                $("#username, #email").removeClass("is-invalid");
                $("#usernameError, #emailError").text("");
            })

            $("#editProfileModal").on("show.bs.modal", function () {
                originalUsername = $("#username").val();
                originalEmail = $("#email").val();
            })

            function resetChangePasswordForm() {
                $("#oldPassword").val("").removeClass("is-invalid");
                $("#newPassword").val("").removeClass("is-invalid");
                $("#confirmPassword").val("").removeClass("is-invalid");

                $("#oldPasswordError").text("");
                $("#newPasswordError").text("");
                $("#confirmPasswordError").text("");
            }
        </script>
    </th:block>
</body>
</html>
