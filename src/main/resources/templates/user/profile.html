<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>User Profile</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="container pt-4 pb-5">
            <!-- Breadcrumb -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/dashboard}" class="text-decoration-none">Dashboard</a></li>
                    <li class="breadcrumb-item active">Profile</li>
                </ol>
            </nav>

            <div class="row">
                <div class="col-lg-4 mb-4">
                    <!-- Profile Card -->
                    <div class="card card-custom animate-fade-in">
                        <div class="card-body text-center p-4">
                            <div class="mb-3">
                                <i class="bi bi-person-circle" style="font-size: 8rem; color: var(--primary-color);"></i>
                            </div>
                            <h4 class="mb-2" th:text="${user.username}">Username</h4>
                            <span class="badge badge-custom role-badge-user mb-3"
                                  th:classappend="${user.role.name() == 'ADMIN'} ? 'role-badge-admin' : (${user.role.name() == 'CONTRIBUTOR'} ? 'role-badge-contributor' : '')"
                                  th:text="${user.role}">
                                </span>
                            <p class="text-muted mb-3">
                                <i class="bi bi-envelope-fill"></i>
                                <span th:text="${user.email}">email@example.com</span>
                            </p>
                            <div class="d-grid">
                                <button class="btn btn-gradient" disabled>
                                    <i class="bi bi-pencil-square"></i> Edit Profile
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <!-- Account Information -->
                    <div class="card card-custom mb-4 animate-fade-in" style="animation-delay: 0.1s;">
                        <div class="card-body">
                            <h5 class="card-title mb-4">
                                <i class="bi bi-info-circle-fill text-primary"></i> Informasi Akun
                            </h5>

                            <div class="table-responsive">
                                <table class="table table-borderless">
                                    <tbody>
                                        <tr>
                                            <td class="text-muted" style="width: 200px;">
                                                <i class="bi bi-person-badge"></i> ID User
                                            </td>
                                            <td class="fw-bold" th:text="${user.id}">#001</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">
                                                <i class="bi bi-person-fill"></i> Username
                                            </td>
                                            <td class="fw-bold" th:text="${user.username}">username</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">
                                                <i class="bi bi-envelope-fill"></i> Email
                                            </td>
                                            <td class="fw-bold" th:text="${user.email}">email@example.com</td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">
                                                <i class="bi bi-award-fill"></i> Role
                                            </td>
                                            <td>
                                                <span class="badge badge-custom role-badge-user"
                                                      th:classappend="${user.role.name() == 'ADMIN'} ? 'role-badge-admin' : (${user.role.name() == 'CONTRIBUTOR'} ? 'role-badge-contributor' : '')"
                                                      th:text="${user.role}">
                                                </span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">
                                                <i class="bi bi-toggle-on"></i> Status
                                            </td>
                                            <td>
                                                <span class="badge bg-success" th:if="${user.enabled}">
                                                    <i class="bi bi-check-circle"></i> Aktif
                                                </span>
                                                <span class="badge bg-danger" th:unless="${user.enabled}">
                                                    <i class="bi bi-x-circle"></i> Tidak Aktif
                                                </span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td class="text-muted">
                                                <i class="bi bi-calendar-plus"></i> Bergabung Sejak
                                            </td>
                                            <td class="fw-bold" th:text="${#temporals.format(user.createdAt, 'dd MMMM yyyy, HH:mm')}">01 Januari 2024</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Activity Stats -->
                    <div class="card card-custom animate-fade-in" style="animation-delay: 0.2s;">
                        <div class="card-body">
                            <h5 class="card-title mb-4">
                                <i class="bi bi-graph-up text-success"></i> Statistik Aktivitas
                            </h5>

                            <div class="row text-center">
                                <div class="col-md-4 mb-3">
                                    <div class="p-3 bg-light rounded">
                                        <i class="bi bi-calendar-check" style="font-size: 2rem; color: var(--primary-color);"></i>
                                        <h4 class="mt-2 mb-0">0</h4>
                                        <small class="text-muted">Total Login</small>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <div class="p-3 bg-light rounded">
                                        <i class="bi bi-clock-history" style="font-size: 2rem; color: var(--secondary-color);"></i>
                                        <h4 class="mt-2 mb-0">0</h4>
                                        <small class="text-muted">Jam Aktif</small>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <div class="p-3 bg-light rounded">
                                        <i class="bi bi-file-earmark" style="font-size: 2rem; color: #fa709a;"></i>
                                        <h4 class="mt-2 mb-0">0</h4>
                                        <small class="text-muted">Konten Dibuat</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
